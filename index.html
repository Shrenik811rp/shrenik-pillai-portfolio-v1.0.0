<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Shrenik Pillai</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/tsparticles@3/tsparticles.bundle.min.js"></script>

<style>
  body{margin:0;background:#0b1026;color:white;font-family:ui-sans-serif;cursor:crosshair;overflow-x:hidden}
  #tsparticles{position:fixed;inset:0;z-index:0}
  .wrap{position:relative;z-index:10}
  section{max-width:1100px;margin:auto;padding:90px 20px}
  h2{font-size:34px;margin-bottom:30px}
  .card{border:1px solid rgba(255,255,255,0.15);padding:22px;border-radius:12px;margin-bottom:20px;transition:.3s}
  .card:hover{transform:translateY(-6px);border-color:#3b82f6}
  .target:hover{outline:2px solid #ef4444;outline-offset:4px}
</style>
</head>

<body>
<div id="tsparticles"></div>
<div class="wrap" id="app"></div>

<script>
tsParticles.load("tsparticles",{
  particles:{
    number:{value:450},
    size:{value:1},
    move:{enable:true,speed:0.25},
    opacity:{value:0.8}
  }
});

fetch('./portfolio-data.json')
.then(r=>r.json())
.then(d=>init(d));

function init(d){
 const a=document.getElementById('app');
 const s=d.settings, sec=d.sections;

 // HERO
 a.innerHTML+=`
 <section class="text-center">
  <img src="${s.profileImage}" width="160" class="mx-auto rounded-full mb-6 target">
  <h1 class="text-5xl font-bold">${s.name}</h1>
  <p class="text-xl mt-2">${s.title} • ${s.location}</p>
  <p class="mt-4 max-w-2xl mx-auto">${s.summary}</p>
  <div class="flex justify-center gap-4 mt-8">
   ${sec.hero.cta.map(b=>`<a href="${b.url}" class="target border px-6 py-2">${b.text}</a>`).join('')}
  </div>
 </section>`;

 // ABOUT + SKILLS
 a.innerHTML+=`
 <section id="about">
  <h2>About Me</h2>
  <p class="mb-6">${sec.about.text}</p>
  <div class="flex flex-wrap gap-3">
   ${sec.about.skills.map(s=>`<span class="target border px-3 py-1">${s}</span>`).join('')}
  </div>
 </section>`;

 // EXPERIENCE
 a.innerHTML+=`<section id="experience"><h2>Experience</h2>`;
 sec.experience.forEach(e=>{
  a.innerHTML+=`
  <div class="card target">
    <h3 class="text-xl font-bold">${e.role} — ${e.company}</h3>
    <p class="text-sm mb-2">${e.period}</p>
    <p>${e.desc}</p>
  </div>`;
 });
 a.innerHTML+=`</section>`;

 // PROJECTS
 a.innerHTML+=`<section id="projects"><h2>Featured Projects</h2>`;
 sec.projects.forEach(p=>{
  a.innerHTML+=`
  <div class="card target">
    <h3 class="text-xl font-bold">${p.title}</h3>
    <p class="mb-3">${p.desc}</p>
    <a href="${p.repo}" target="_blank" class="underline">View Code</a>
  </div>`;
 });
 a.innerHTML+=`</section>`;

 // EDUCATION
 a.innerHTML+=`<section id="education"><h2>Education</h2>`;
 sec.education.forEach(ed=>{
  a.innerHTML+=`
  <div class="card target">
    <h3 class="font-bold">${ed.place}</h3>
    <p>${ed.degree}</p>
    <p class="text-sm">${ed.period}</p>
  </div>`;
 });
 a.innerHTML+=`</section>`;

 // CONTACT
 a.innerHTML+=`
 <section id="contact" class="text-center">
   <h2>Contact</h2>
   <p>${sec.contact.email}</p>
   <p>${sec.contact.phone}</p>
 </section>`;
}
</script>
</body>
</html>

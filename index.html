  <head>
    <meta charset="UTF-8" />

    <title>Shrenik Pillai - Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              "space-grotesk": ["Space Grotesk", "sans-serif"],
              "orbitron": ["Orbitron", "sans-serif"],
            },
            animation: {
              "blur-in": "blurIn 0.7s ease-out forwards",
              "fade-in": "fadeIn 0.5s ease-out forwards",
              "slide-up": "slideUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1)",
              "slide-in-left": "slideInLeft 0.8s cubic-bezier(0.34, 1.56, 0.64, 1)",
              "slide-in-right": "slideInRight 0.8s cubic-bezier(0.34, 1.56, 0.64, 1)",
              "scale-in": "scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)",
              "fade-in-scale": "fadeInScale 0.6s cubic-bezier(0.34, 1.56, 0.64, 1)",
              "float": "float 3s ease-in-out infinite",
              "pulse-glow": "pulseGlow 2s ease-in-out infinite",
              "rotate-in": "rotateIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1)",
              "swirl-in": "swirlIn 1s cubic-bezier(0.34, 1.56, 0.64, 1)",
              "flip-in": "flipIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1)",
              "shimmer": "shimmer 2s linear infinite",
              "bounce-up": "bounceUp 0.5s ease-out",
            },
            keyframes: {
              blurIn: {
                "0%": { filter: "blur(5px)", opacity: "0" },
                "100%": { filter: "blur(0)", opacity: "1" },
              },
              fadeIn: {
                "0%": { opacity: "0", transform: "translateY(20px)" },
                "100%": { opacity: "1", transform: "translateY(0)" },
              },
              slideUp: {
                "0%": { opacity: "0", transform: "translateY(40px)" },
                "100%": { opacity: "1", transform: "translateY(0)" },
              },
              slideInLeft: {
                "0%": { opacity: "0", transform: "translateX(-60px) rotate(-5deg)" },
                "100%": { opacity: "1", transform: "translateX(0) rotate(0deg)" },
              },
              slideInRight: {
                "0%": { opacity: "0", transform: "translateX(60px) rotate(5deg)" },
                "100%": { opacity: "1", transform: "translateX(0) rotate(0deg)" },
              },
              scaleIn: {
                "0%": { opacity: "0", transform: "scale(0.8)" },
                "100%": { opacity: "1", transform: "scale(1)" },
              },
              fadeInScale: {
                "0%": { opacity: "0", transform: "scale(0.9) translateY(20px)" },
                "100%": { opacity: "1", transform: "scale(1) translateY(0)" },
              },
              float: {
                "0%, 100%": { transform: "translateY(0px)" },
                "50%": { transform: "translateY(-10px)" },
              },
              pulseGlow: {
                "0%, 100%": { boxShadow: "0 0 20px rgba(59, 130, 246, 0.5)" },
                "50%": { boxShadow: "0 0 40px rgba(59, 130, 246, 0.8)" },
              },
              rotateIn: {
                "0%": { opacity: "0", transform: "perspective(1000px) rotateY(-15deg) scale(0.9)" },
                "100%": { opacity: "1", transform: "perspective(1000px) rotateY(0deg) scale(1)" },
              },
              swirlIn: {
                "0%": { opacity: "0", transform: "perspective(1000px) rotateX(-20deg) rotateZ(-10deg) scale(0.8)" },
                "100%": { opacity: "1", transform: "perspective(1000px) rotateX(0deg) rotateZ(0deg) scale(1)" },
              },
              flipIn: {
                "0%": { opacity: "0", transform: "perspective(1000px) rotateX(90deg)" },
                "100%": { opacity: "1", transform: "perspective(1000px) rotateX(0deg)" },
              },
              shimmer: {
                "0%": { backgroundPosition: "-1000px 0" },
                "100%": { backgroundPosition: "1000px 0" },
              },
              bounceUp: {
                "0%": { transform: "translateY(0)" },
                "50%": { transform: "translateY(-10px)" },
                "100%": { transform: "translateY(0)" },
              },
            },
          },
        },
        darkMode: "selector",
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Orbitron:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="canonical" href="" id="canonical-link" />
    <style>
      * {
        transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
      }

      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
      }

      body {
        overflow-x: hidden;
        position: relative;
      }

      /* Custom Crosshair Cursor for Desktop */
      @media (hover: hover) and (pointer: fine) {
        body, body * {
          cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32"><circle cx="16" cy="16" r="2" fill="rgba(59, 130, 246, 0.8)"/><line x1="16" y1="4" x2="16" y2="12" stroke="rgba(59, 130, 246, 0.8)" stroke-width="2"/><line x1="16" y1="20" x2="16" y2="28" stroke="rgba(59, 130, 246, 0.8)" stroke-width="2"/><line x1="4" y1="16" x2="12" y2="16" stroke="rgba(59, 130, 246, 0.8)" stroke-width="2"/><line x1="20" y1="16" x2="28" y2="16" stroke="rgba(59, 130, 246, 0.8)" stroke-width="2"/></svg>') 16 16, auto !important;
        }

        button, a, input, textarea, select {
          cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32"><circle cx="16" cy="16" r="8" fill="none" stroke="rgba(239, 68, 68, 0.8)" stroke-width="2"/><circle cx="16" cy="16" r="2" fill="rgba(239, 68, 68, 0.8)"/><line x1="16" y1="0" x2="16" y2="8" stroke="rgba(239, 68, 68, 0.8)" stroke-width="2"/><line x1="16" y1="24" x2="16" y2="32" stroke="rgba(239, 68, 68, 0.8)" stroke-width="2"/><line x1="0" y1="16" x2="8" y2="16" stroke="rgba(239, 68, 68, 0.8)" stroke-width="2"/><line x1="24" y1="16" x2="32" y2="16" stroke="rgba(239, 68, 68, 0.8)" stroke-width="2"/></svg>') 16 16, pointer !important;
        }
      }

      /* Touch-friendly cursor for mobile/tablet */
      @media (hover: none) and (pointer: coarse) {
        body, body * {
          cursor: auto !important;
        }
        
        button, a, input, textarea, select {
          cursor: pointer !important;
        }
      }

      /* Text selection */
      ::selection {
        background-color: rgba(59, 130, 246, 0.3);
        color: inherit;
      }

      ::-moz-selection {
        background-color: rgba(59, 130, 246, 0.3);
        color: inherit;
      }

      /* Loading Screen - Dynamically Centered */
      #loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 30px;
        padding: 20px;
      }

      .loading-title {
        font-family: 'Orbitron', sans-serif;
        font-size: 2.5rem;
        font-weight: 900;
        color: #3b82f6;
        text-shadow: 0 0 20px rgba(59, 130, 246, 0.8);
        letter-spacing: 4px;
        text-align: center;
      }

      .loading-bar-container {
        width: min(400px, 90vw);
        max-width: 400px;
        height: 30px;
        background: rgba(255, 255, 255, 0.1);
        border: 2px solid #3b82f6;
        border-radius: 15px;
        overflow: hidden;
        box-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
      }

      .loading-bar {
        height: 100%;
        background: linear-gradient(90deg, #3b82f6, #8b5cf6, #3b82f6);
        background-size: 200% 100%;
        animation: shimmer 2s linear infinite;
        width: 0%;
        transition: width 0.3s ease;
      }

      .loading-text {
        font-family: 'Orbitron', sans-serif;
        color: #93c5fd;
        font-size: 1rem;
        letter-spacing: 2px;
        text-align: center;
      }

      @media (max-width: 640px) {
        .loading-title {
          font-size: 1.5rem;
          letter-spacing: 2px;
        }
        .loading-bar-container {
          height: 24px;
        }
        .loading-text {
          font-size: 0.875rem;
        }
      }

      /* Vector Background Images for Light Mode */
      body:not(.dark) #vector-background {
        display: block !important;
      }

      body.dark #vector-background {
        display: none !important;
      }

      #vector-background {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 0;
        opacity: 0.08;
        overflow: hidden;
        display: none;
      }

      .vector-shape {
        position: absolute;
        opacity: 0.5;
      }

      /* Starfield */
      #starfield {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 0;
      }

      .star {
        position: absolute;
        background: white;
        border-radius: 50%;
        opacity: 0;
        animation: twinkle 3s infinite ease-in-out;
      }

      @keyframes twinkle {
        0%, 100% { opacity: 0; transform: scale(1); }
        50% { opacity: 0.8; transform: scale(1.2); }
      }

      /* Quirky Heading Hover Animations */
      .heading-quirky {
        display: inline-block;
        position: relative;
        transition: all 0.3s ease;
      }

      .heading-quirky::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        width: 0;
        height: 0;
        background: radial-gradient(circle, rgba(59, 130, 246, 0.2), transparent);
        border-radius: 50%;
        transform: translate(-50%, -50%);
        transition: width 0.4s ease, height 0.4s ease;
        z-index: -1;
      }

      .heading-quirky:hover::before {
        width: 120%;
        height: 120%;
      }

      .heading-quirky:hover {
        transform: rotate(-2deg) scale(1.05);
        color: #3b82f6;
      }

      .dark .heading-quirky:hover {
        color: #60a5fa;
      }

      .heading-quirky span {
        display: inline-block;
        transition: transform 0.1s ease;
      }

      .heading-quirky:hover span {
        animation: wave 0.6s ease-in-out;
      }

      .heading-quirky:hover span:nth-child(even) {
        animation-delay: 0.1s;
      }

      @keyframes wave {
        0%, 100% { transform: translateY(0); }
        25% { transform: translateY(-8px); }
        75% { transform: translateY(4px); }
      }

      /* Scroll reveal animations */
      .scroll-reveal {
        opacity: 0;
        transform: translateY(30px);
        transition: opacity 0.6s ease-out, transform 0.6s ease-out;
      }

      .scroll-reveal.revealed {
        opacity: 1;
        transform: translateY(0);
      }

      .scroll-reveal.un-revealed {
        opacity: 0;
        transform: translateY(30px);
      }

      .scroll-reveal-scale {
        opacity: 0;
        transform: scale(0.9);
        transition: opacity 0.6s ease-out, transform 0.6s ease-out;
      }

      .scroll-reveal-scale.revealed {
        opacity: 1;
        transform: scale(1);
      }

      .scroll-reveal-scale.un-revealed {
        opacity: 0;
        transform: scale(0.9);
      }

      .scroll-reveal-left {
        opacity: 0;
        transform: translateX(-50px);
        transition: opacity 0.6s ease-out, transform 0.6s ease-out;
      }

      .scroll-reveal-left.revealed {
        opacity: 1;
        transform: translateX(0);
      }

      .scroll-reveal-left.un-revealed {
        opacity: 0;
        transform: translateX(-50px);
      }

      .scroll-reveal-right {
        opacity: 0;
        transform: translateX(50px);
        transition: opacity 0.6s ease-out, transform 0.6s ease-out;
      }

      .scroll-reveal-right.revealed {
        opacity: 1;
        transform: translateX(0);
      }

      .scroll-reveal-right.un-revealed {
        opacity: 0;
        transform: translateX(50px);
      }

      /* Skills pill - matching nav button animation */
      .skill-pill {
        position: relative;
        overflow: hidden;
        transition: all 0.3s ease;
      }

      .skill-pill::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        width: 0;
        height: 0;
        background: rgba(59, 130, 246, 0.15);
        border-radius: 9999px;
        transform: translate(-50%, -50%);
        transition: width 0.4s ease, height 0.4s ease;
      }

      .skill-pill:hover::before {
        width: 100%;
        height: 100%;
      }

      .skill-pill:hover {
        box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.5);
        transform: translateY(-2px);
      }

      .dark .skill-pill::before {
        background: rgba(96, 165, 250, 0.15);
      }

      .dark .skill-pill:hover {
        box-shadow: 0 0 0 2px rgba(96, 165, 250, 0.5);
      }

      /* Back to top button */
      #back-to-top {
        position: fixed;
        bottom: 30px;
        right: 30px;
        width: 50px;
        height: 50px;
        border-radius: 50%;
        background: linear-gradient(135deg, #3b82f6, #8b5cf6);
        color: white;
        display: none;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        z-index: 1000;
        transition: all 0.3s ease;
        border: none;
        font-size: 24px;
      }

      #back-to-top:hover {
        transform: translateY(-5px) scale(1.1);
        box-shadow: 0 8px 25px rgba(59, 130, 246, 0.6);
      }

      #back-to-top.show {
        display: flex;
        animation: bounceUp 0.5s ease-out;
      }

      @media (max-width: 640px) {
        #back-to-top {
          width: 45px;
          height: 45px;
          bottom: 20px;
          right: 20px;
          font-size: 20px;
        }
      }

      /* Glitch effect */
      .glitch {
        position: relative;
        animation: none;
      }

      /* Navigation */
      .nav-desktop {
        display: block;
      }

      .nav-mobile {
        display: none;
      }

      @media (max-width: 768px) {
        .nav-desktop {
          display: none;
        }

        .nav-mobile {
          display: block;
        }
      }

      @media (min-width: 769px) {
        .nav-mobile\:pt-20 {
          padding-top: 0 !important;
        }

        .nav-mobile\:pt-8 {
          padding-top: 0 !important;
        }
      }

      .rpg-button {
        position: relative;
        overflow: hidden;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .rpg-button::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        width: 0;
        height: 0;
        background: radial-gradient(circle, rgba(59, 130, 246, 0.3), transparent);
        border-radius: 50%;
        transform: translate(-50%, -50%);
        transition: width 0.4s ease, height 0.4s ease;
      }

      .rpg-button:hover::before {
        width: 200%;
        height: 200%;
      }

      .rpg-button:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      }

      .target-lock {
        box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3);
      }

      .target-lock:hover {
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.5), 0 10px 25px rgba(0, 0, 0, 0.2);
      }

      .profile-image-container {
        transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      .profile-image-container:hover {
        transform: scale(1.05) rotate(5deg);
      }
    </style>
  </head>

    <!-- Back to Top Button -->
    <button id="back-to-top" aria-label="Back to top">↑</button>

    <script>
      let starfield = null;
      let loadingManager = null;
      let scrollAnimationManager = null;

      class LoadingManager {
        constructor() {
          this.screen = document.getElementById('loading-screen');
          this.bar = document.getElementById('loading-bar');
          this.text = document.getElementById('loading-text');
          this.progress = 0;
        }

        updateProgress(value) {
          try {
            this.progress = Math.min(value, 100);
            if (this.bar) this.bar.style.width = this.progress + '%';
            
            if (this.text) {
              if (this.progress < 30) this.text.textContent = 'INITIALIZING...';
              else if (this.progress < 60) this.text.textContent = 'LOADING ASSETS...';
              else if (this.progress < 90) this.text.textContent = 'PREPARING INTERFACE...';
              else this.text.textContent = 'ALMOST READY...';
            }
          } catch (e) {
            console.warn('Loading progress update failed:', e);
          }
        }

        complete() {
          try {
            this.updateProgress(100);
            setTimeout(() => {
              if (this.screen) {
                this.screen.style.opacity = '0';
                this.screen.style.transition = 'opacity 0.5s ease-out';
                setTimeout(() => {
                  if (this.screen) this.screen.style.display = 'none';
                }, 500);
              }
            }, 300);
          } catch (e) {
            console.warn('Loading completion failed:', e);
            if (this.screen) this.screen.style.display = 'none';
          }
        }
      }

      class StarfieldSystem {
        constructor() {
          try {
            this.container = document.getElementById('starfield');
            if (!this.container) return;
            
            this.stars = [];
            this.starCount = window.innerWidth < 768 ? 50 : 100;
            this.createStars();
            
            window.addEventListener('resize', () => this.handleResize());
          } catch (e) {
            console.warn('Starfield initialization failed:', e);
          }
        }

        createStars() {
          try {
            if (!this.container) return;
            this.container.innerHTML = '';
            this.stars = [];
            
            for (let i = 0; i < this.starCount; i++) {
              const star = document.createElement('div');
              star.className = 'star';
              const size = Math.random() * 2 + 1;
              star.style.width = size + 'px';
              star.style.height = size + 'px';
              star.style.left = Math.random() * 100 + '%';
              star.style.top = Math.random() * 100 + '%';
              star.style.animationDelay = Math.random() * 3 + 's';
              star.style.animationDuration = (Math.random() * 2 + 2) + 's';
              
              this.container.appendChild(star);
              this.stars.push(star);
            }
          } catch (e) {
            console.warn('Star creation failed:', e);
          }
        }

        handleResize() {
          try {
            const newStarCount = window.innerWidth < 768 ? 50 : 100;
            if (newStarCount !== this.starCount) {
              this.starCount = newStarCount;
              this.createStars();
            }
          } catch (e) {
            console.warn('Starfield resize failed:', e);
          }
        }
      }

      class ScrollAnimationManager {
        constructor() {
          try {
            this.elements = [];
            this.lastScrollY = window.scrollY;
            this.isScrollingDown = true;
            
            this.observeElements();
            this.handleScroll();
            
            window.addEventListener('scroll', () => this.handleScroll(), { passive: true });
            window.addEventListener('resize', () => this.observeElements());
          } catch (e) {
            console.warn('ScrollAnimationManager initialization failed:', e);
          }
        }

        observeElements() {
          try {
            this.elements = Array.from(document.querySelectorAll('.scroll-reveal, .scroll-reveal-scale, .scroll-reveal-left, .scroll-reveal-right'));
          } catch (e) {
            console.warn('Element observation failed:', e);
          }
        }

        handleScroll() {
          try {
            const currentScrollY = window.scrollY;
            this.isScrollingDown = currentScrollY > this.lastScrollY;
            this.lastScrollY = currentScrollY;

            const windowHeight = window.innerHeight;
            const triggerPoint = windowHeight * 0.85;

            this.elements.forEach(element => {
              try {
                const rect = element.getBoundingClientRect();
                const elementTop = rect.top;
                const elementBottom = rect.bottom;

                // Element is in viewport
                if (this.isScrollingDown) {
                  // Scrolling down - reveal when entering from bottom
                  if (elementTop < triggerPoint && elementBottom > 0) {
                    element.classList.add('revealed');
                    element.classList.remove('un-revealed');
                  }
                } else {
                  // Scrolling up - reveal when entering from top
                  if (elementTop < windowHeight && elementBottom > windowHeight * 0.15) {
                    element.classList.add('revealed');
                    element.classList.remove('un-revealed');
                  } else if (elementBottom < windowHeight * 0.15) {
                    // Element is above viewport - un-reveal it
                    element.classList.remove('revealed');
                    element.classList.add('un-revealed');
                  }
                }

                // Un-reveal when element completely leaves viewport
                if (elementBottom < 0 || elementTop > windowHeight) {
                  if (this.isScrollingDown && elementBottom < 0) {
                    element.classList.remove('revealed');
                    element.classList.add('un-revealed');
                  } else if (!this.isScrollingDown && elementTop > windowHeight) {
                    element.classList.remove('revealed');
                    element.classList.add('un-revealed');
                  }
                }
              } catch (e) {
                console.warn('Element scroll handling failed:', e);
              }
            });

            // Handle back-to-top button
            const backToTop = document.getElementById('back-to-top');
            if (backToTop) {
              if (currentScrollY > 300) {
                backToTop.classList.add('show');
              } else {
                backToTop.classList.remove('show');
              }
            }
          } catch (e) {
            console.warn('Scroll handling failed:', e);
          }
        }
      }

      function setupTheme() {
        try {
          const toggle = document.getElementById("theme-toggle");
          if (!toggle) return;

          const savedTheme = localStorage.getItem("theme");
          const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          const initialTheme = savedTheme || (prefersDark ? "dark" : "light");

          if (initialTheme === "dark") {
            document.documentElement.classList.add("dark");
            toggle.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>`;
          } else {
            document.documentElement.classList.remove("dark");
            toggle.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>`;
          }

          toggle.addEventListener("click", () => {
            try {
              const isDark = document.documentElement.classList.toggle("dark");
              localStorage.setItem("theme", isDark ? "dark" : "light");
              toggle.innerHTML = isDark
                ? `<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>`

            } catch (e) {

          if (val.startsWith("http://") || val.startsWith("https://") || val.startsWith("mailto:")) return val;

          console.warn('URL validation failed:', e);

            <p class="animate-fade-in font-orbitron">${data.footer.copyright}</p>
        </footer>
      `;
          }

          const content = `
    ${headerHTML}
    <div class="flex flex-col min-h-screen relative nav-mobile:pt-20">
      <div class="nav-desktop fixed top-4 right-4 z-50 animate-fade-in">
          <button id="theme-toggle" class="p-3 rounded-full bg-gray-200 dark:bg-gray-800 text-gray-900 dark:text-white hover:bg-gray-300 dark:hover:bg-gray-700 transition-all duration-300 hover:scale-110 rpg-button target-lock shadow-lg"></button>
      </div>
      <main class="flex-grow max-w-4xl mx-auto px-4 sm:px-6 pt-32 sm:pt-40 pb-12 animate-blur-in nav-mobile:pt-8 relative z-10">
        <header class="grid grid-cols-1 sm:grid-cols-3 gap-8 sm:gap-12 items-center mb-16 sm:mb-20">
            <div class="sm:col-span-1 flex justify-center scroll-reveal-scale">
              <div class="relative group">
                <div class="absolute inset-0 bg-gradient-to-r from-blue-500 to-purple-600 rounded-full blur-2xl opacity-60 group-hover:opacity-90 transition-opacity duration-500 animate-pulse-glow"></div>
                <img src="${data.settings.profileImage}" alt="${data.settings.name}" class="profile-image-container relative rounded-full w-40 h-40 sm:w-48 sm:h-48 object-cover border-4 border-white dark:border-gray-800 shadow-2xl" loading="lazy">
              </div>
            </div>
            <div class="sm:col-span-2 scroll-reveal text-center sm:text-left">
                <h1 class="text-3xl sm:text-5xl font-bold text-gray-900 dark:text-white mb-2"><span class="heading-quirky">${wrapHeadingText(`Hey, I'm ${data.settings.name}`)}</span></h1>
                <p class="text-base sm:text-xl text-gray-700 dark:text-gray-300 mb-6 font-medium">${data.settings.title} • ${data.settings.location}</p>
                 <div class="flex flex-wrap gap-4 mt-8 justify-center sm:justify-start">
                  ${ctaButtonsHTML}
                </div>
            </div>
        </header>

        ${aboutHTML}
        ${skillsHTML}
        ${projectsHTML}
        ${experienceHTML}
        ${educationHTML}
        ${achievementsHTML}
        ${contactHTML}

      </main>
      ${footerHTML}
    </div>
    `;

          document.getElementById("app").innerHTML = content;
          
          loadingManager.updateProgress(95);
          
          setupTheme();
          
          // Setup mobile theme toggle
          const mobileToggle = document.getElementById("theme-toggle-mobile");
          if (mobileToggle) {
            const updateMobileToggle = () => {
              const isDark = document.documentElement.classList.contains("dark");
              mobileToggle.innerHTML = isDark
                ? `<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>`
                : `<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>`;
            };
            
            updateMobileToggle();
            
            mobileToggle.addEventListener("click", () => {
              const isDark = document.documentElement.classList.toggle("dark");
              localStorage.setItem("theme", isDark ? "dark" : "light");
              updateMobileToggle();
              const desktopToggle = document.getElementById("theme-toggle");
              if (desktopToggle) {
                desktopToggle.innerHTML = isDark
                  ? `<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>`
                  : `<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>`;
              }
            });
          }
          
          // Initialize scroll animations
          scrollAnimationManager = new ScrollAnimationManager();

          // Back to top button functionality
          const backToTopBtn = document.getElementById('back-to-top');
          if (backToTopBtn) {
            backToTopBtn.addEventListener('click', (e) => {
              e.preventDefault();
              window.scrollTo({
                top: 0,
                behavior: 'smooth'
              });
            });
          }

          try {
            const personSchema = {
              "@context": "https://schema.org",
              "@type": "Person",
              name: data.settings.name,
              jobTitle: data.settings.title,
              description: data.settings.summary,
              image: data.settings.profileImage,
              url: window.location.href,
              sameAs: (data.sections.social?.items || []).map((s) => ensureUrl(s.url)),
              address: {
                "@type": "PostalAddress",
                addressLocality: data.settings.location,
              },
            };
            const ld = document.createElement("script");
            ld.type = "application/ld+json";
            ld.textContent = JSON.stringify(personSchema);
            document.head.appendChild(ld);
          } catch (e) {
            console.warn("JSON-LD injection failed", e);
          }

          document.querySelectorAll('a[href^="#"]').forEach((anchor) => {
            anchor.addEventListener("click", function (e) {
              e.preventDefault();
              const targetId = this.getAttribute("href");
              if (targetId === "#") {
                window.scrollTo({ top: 0, behavior: "smooth" });
                return;
              }
              const targetElement = document.querySelector(targetId);
              if (targetElement) {
                targetElement.scrollIntoView({ behavior: "smooth", block: "start" });
              }
            });
          });

          const hamburgerMenu = document.getElementById("hamburger-menu");
          const sidebar = document.getElementById("mobile-sidebar");

          function closeSidebar() {
            if (sidebar) {
              sidebar.classList.add("-translate-x-full");
            }
          }

          if (hamburgerMenu && sidebar) {
            hamburgerMenu.addEventListener("click", () => {
              const isOpen = !sidebar.classList.contains("-translate-x-full");
              if (isOpen) {
                closeSidebar();
              } else {
                sidebar.classList.remove("-translate-x-full");
              }
            });

            sidebar.querySelectorAll("a").forEach((link) => {
              link.addEventListener("click", () => {
                closeSidebar();
              });
            });

            document.addEventListener("click", (event) => {
              if (!sidebar.contains(event.target) && !hamburgerMenu.contains(event.target)) {
                closeSidebar();
              }
            });

            document.addEventListener("keydown", (event) => {
              if (event.key === "Escape") {
                closeSidebar();
              }
            });
          }
          
          loadingManager.complete();
        } catch (err) {
          document.getElementById("app").innerHTML = `<div class="text-red-500 p-8 text-center">Error: ${err.message}</div>`;
          console.error(err);
          loadingManager.complete();
        }
      }

      function handleContactForm(event) {
        try {
          event.preventDefault();
          const form = event.target;
          
          const successMsg = document.createElement('div');
          successMsg.className = 'fixed top-20 left-1/2 -translate-x-1/2 z-50 bg-gradient-to-r from-green-500 to-emerald-600 text-white px-6 py-3 rounded-lg shadow-2xl animate-slide-up font-orbitron';
          successMsg.textContent = '✓ MESSAGE SENT SUCCESSFULLY';
          document.body.appendChild(successMsg);
          
          setTimeout(() => {
            successMsg.style.animation = 'fadeOut 0.5s ease-out forwards';
            setTimeout(() => successMsg.remove(), 500);
          }, 4000);
          
          form.reset();
        } catch (e) {
          console.warn('Form submission handling failed:', e);
        }
      }

      document.addEventListener("DOMContentLoaded", () => {
        try {
          loadingManager = new LoadingManager();
          loadingManager.updateProgress(10);
          
          starfield = new StarfieldSystem();
          loadingManager.updateProgress(20);
          
          renderPortfolio();
        } catch (e) {
          console.error('Initialization failed:', e);
          document.getElementById('loading-screen').style.display = 'none';
          document.getElementById("app").innerHTML = `<div class="text-red-500 p-8 text-center">Failed to initialize portfolio. Please refresh the page.</div>`;
        }
      });
    </script>
  </body>
</html>

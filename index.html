<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shrenik Pillai - Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              "space-grotesk": ["Space Grotesk", "sans-serif"],
              "orbitron": ["Orbitron", "sans-serif"],
            },
            animation: {
              "blur-in": "blurIn 0.7s ease-out forwards",
              "fade-in": "fadeIn 0.5s ease-out forwards",
              "slide-up": "slideUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1)",
              "slide-in-left": "slideInLeft 0.8s cubic-bezier(0.34, 1.56, 0.64, 1)",
              "slide-in-right": "slideInRight 0.8s cubic-bezier(0.34, 1.56, 0.64, 1)",
              "scale-in": "scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)",
              "fade-in-scale": "fadeInScale 0.6s cubic-bezier(0.34, 1.56, 0.64, 1)",
              "float": "float 3s ease-in-out infinite",
              "pulse-glow": "pulseGlow 2s ease-in-out infinite",
              "rotate-in": "rotateIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1)",
              "swirl-in": "swirlIn 1s cubic-bezier(0.34, 1.56, 0.64, 1)",
              "flip-in": "flipIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1)",
              "shimmer": "shimmer 2s linear infinite",
              "bounce-up": "bounceUp 0.5s ease-out",
            },
            keyframes: {
              blurIn: {
                "0%": { filter: "blur(5px)", opacity: "0" },
                "100%": { filter: "blur(0)", opacity: "1" },
              },
              fadeIn: {
                "0%": { opacity: "0", transform: "translateY(20px)" },
                "100%": { opacity: "1", transform: "translateY(0)" },
              },
              slideUp: {
                "0%": { opacity: "0", transform: "translateY(40px)" },
                "100%": { opacity: "1", transform: "translateY(0)" },
              },
              slideInLeft: {
                "0%": { opacity: "0", transform: "translateX(-60px) rotate(-5deg)" },
                "100%": { opacity: "1", transform: "translateX(0) rotate(0deg)" },
              },
              slideInRight: {
                "0%": { opacity: "0", transform: "translateX(60px) rotate(5deg)" },
                "100%": { opacity: "1", transform: "translateX(0) rotate(0deg)" },
              },
              scaleIn: {
                "0%": { opacity: "0", transform: "scale(0.8)" },
                "100%": { opacity: "1", transform: "scale(1)" },
              },
              fadeInScale: {
                "0%": { opacity: "0", transform: "scale(0.9) translateY(20px)" },
                "100%": { opacity: "1", transform: "scale(1) translateY(0)" },
              },
              float: {
                "0%, 100%": { transform: "translateY(0px)" },
                "50%": { transform: "translateY(-10px)" },
              },
              pulseGlow: {
                "0%, 100%": { boxShadow: "0 0 20px rgba(59, 130, 246, 0.5)" },
                "50%": { boxShadow: "0 0 40px rgba(59, 130, 246, 0.8)" },
              },
              rotateIn: {
                "0%": { opacity: "0", transform: "perspective(1000px) rotateY(-15deg) scale(0.9)" },
                "100%": { opacity: "1", transform: "perspective(1000px) rotateY(0deg) scale(1)" },
              },
              swirlIn: {
                "0%": { opacity: "0", transform: "perspective(1000px) rotateX(-20deg) rotateZ(-10deg) scale(0.8)" },
                "100%": { opacity: "1", transform: "perspective(1000px) rotateX(0deg) rotateZ(0deg) scale(1)" },
              },
              flipIn: {
                "0%": { opacity: "0", transform: "perspective(1000px) rotateX(90deg)" },
                "100%": { opacity: "1", transform: "perspective(1000px) rotateX(0deg)" },
              },
              shimmer: {
                "0%": { backgroundPosition: "-1000px 0" },
                "100%": { backgroundPosition: "1000px 0" },
              },
              bounceUp: {
                "0%": { transform: "translateY(0)" },
                "50%": { transform: "translateY(-10px)" },
                "100%": { transform: "translateY(0)" },
              },
            },
          },
        },
        darkMode: "selector",
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Orbitron:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="canonical" href="" id="canonical-link" />
    <style>
      * {
        transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
      }

      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
      }

      body {
        overflow-x: hidden;
        position: relative;
      }

      /* Custom Crosshair Cursor for Desktop */
      @media (hover: hover) and (pointer: fine) {
        body, body * {
          cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32"><circle cx="16" cy="16" r="2" fill="rgba(59, 130, 246, 0.8)"/><line x1="16" y1="4" x2="16" y2="12" stroke="rgba(59, 130, 246, 0.8)" stroke-width="2"/><line x1="16" y1="20" x2="16" y2="28" stroke="rgba(59, 130, 246, 0.8)" stroke-width="2"/><line x1="4" y1="16" x2="12" y2="16" stroke="rgba(59, 130, 246, 0.8)" stroke-width="2"/><line x1="20" y1="16" x2="28" y2="16" stroke="rgba(59, 130, 246, 0.8)" stroke-width="2"/></svg>') 16 16, auto !important;
        }

        button, a, input, textarea, select {
          cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32"><circle cx="16" cy="16" r="8" fill="none" stroke="rgba(239, 68, 68, 0.8)" stroke-width="2"/><circle cx="16" cy="16" r="2" fill="rgba(239, 68, 68, 0.8)"/><line x1="16" y1="0" x2="16" y2="8" stroke="rgba(239, 68, 68, 0.8)" stroke-width="2"/><line x1="16" y1="24" x2="16" y2="32" stroke="rgba(239, 68, 68, 0.8)" stroke-width="2"/><line x1="0" y1="16" x2="8" y2="16" stroke="rgba(239, 68, 68, 0.8)" stroke-width="2"/><line x1="24" y1="16" x2="32" y2="16" stroke="rgba(239, 68, 68, 0.8)" stroke-width="2"/></svg>') 16 16, pointer !important;
        }
      }

      /* Touch-friendly cursor for mobile/tablet */
      @media (hover: none) and (pointer: coarse) {
        body, body * {
          cursor: auto !important;
        }
        
        button, a, input, textarea, select {
          cursor: pointer !important;
        }
      }

      /* Text selection */
      ::selection {
        background-color: rgba(59, 130, 246, 0.3);
        color: inherit;
      }

      ::-moz-selection {
        background-color: rgba(59, 130, 246, 0.3);
        color: inherit;
      }

      /* Loading Screen - Dynamically Centered */
      #loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 30px;
        padding: 20px;
      }

      .loading-title {
        font-family: 'Orbitron', sans-serif;
        font-size: clamp(1.5rem, 5vw, 2.5rem);
        font-weight: 900;
        color: #3b82f6;
        text-shadow: 0 0 20px rgba(59, 130, 246, 0.8);
        letter-spacing: 4px;
        text-align: center;
        word-break: break-word;
      }

      .loading-bar-container {
        width: min(400px, 90vw);
        max-width: 400px;
        height: 30px;
        background: rgba(255, 255, 255, 0.1);
        border: 2px solid #3b82f6;
        border-radius: 15px;
        overflow: hidden;
        box-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
      }

      .loading-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #3b82f6, #8b5cf6, #3b82f6);
        background-size: 200% 100%;
        animation: shimmer 2s linear infinite;
        transition: width 0.3s ease;
      }

      .loading-text {
        font-family: 'Orbitron', sans-serif;
        font-size: clamp(0.875rem, 3vw, 1rem);
        color: #93c5fd;
        letter-spacing: 2px;
        text-align: center;
      }

      /* Starfield Background */
      #starfield {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        pointer-events: none;
      }

      .star {
        position: absolute;
        background: white;
        border-radius: 50%;
        opacity: 0.8;
        animation: twinkle 3s infinite ease-in-out;
      }

      @keyframes twinkle {
        0%, 100% { opacity: 0.3; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.2); }
      }

      /* Light mode vector background */
      body:not(.dark) #vector-bg {
        display: block;
      }

      body.dark #vector-bg {
        display: none;
      }

      #vector-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -2;
        pointer-events: none;
        opacity: 0.05;
        overflow: hidden;
      }

      .vector-shape {
        position: absolute;
        opacity: 0.6;
      }

      .vector-circle {
        width: 300px;
        height: 300px;
        border-radius: 50%;
        border: 3px solid #3b82f6;
      }

      .vector-triangle {
        width: 0;
        height: 0;
        border-left: 150px solid transparent;
        border-right: 150px solid transparent;
        border-bottom: 260px solid #8b5cf6;
      }

      .vector-square {
        width: 200px;
        height: 200px;
        border: 3px solid #ec4899;
        transform: rotate(45deg);
      }

      /* Scroll reveal animations */
      .scroll-reveal,
      .scroll-reveal-scale,
      .scroll-reveal-left,
      .scroll-reveal-right {
        opacity: 0;
        transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      .scroll-reveal {
        transform: translateY(50px);
      }

      .scroll-reveal-scale {
        transform: scale(0.8);
      }

      .scroll-reveal-left {
        transform: translateX(-60px);
      }

      .scroll-reveal-right {
        transform: translateX(60px);
      }

      .scroll-reveal.revealed,
      .scroll-reveal-scale.revealed,
      .scroll-reveal-left.revealed,
      .scroll-reveal-right.revealed {
        opacity: 1;
        transform: translateY(0) translateX(0) scale(1);
      }

      /* Unrevealed state for reverse scroll */
      .scroll-reveal.un-revealed {
        opacity: 0;
        transform: translateY(50px);
      }

      .scroll-reveal-scale.un-revealed {
        opacity: 0;
        transform: scale(0.8);
      }

      .scroll-reveal-left.un-revealed {
        opacity: 0;
        transform: translateX(-60px);
      }

      .scroll-reveal-right.un-revealed {
        opacity: 0;
        transform: translateX(60px);
      }

      /* Quirky heading hover animation - Jello wiggle */
      .heading-quirky {
        display: inline-block;
        position: relative;
      }

      .heading-quirky span {
        display: inline-block;
        transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      }

      .heading-quirky:hover span {
        animation: jelloWiggle 0.6s ease-in-out;
      }

      @keyframes jelloWiggle {
        0%, 100% { transform: skewX(0deg) skewY(0deg); }
        25% { transform: skewX(-12deg) skewY(-8deg) scale(1.05); }
        50% { transform: skewX(10deg) skewY(6deg) scale(0.95); }
        75% { transform: skewX(-8deg) skewY(-4deg) scale(1.02); }
      }

      .heading-quirky:hover span:nth-child(even) {
        animation-delay: 0.05s;
      }

      .heading-quirky:hover span:nth-child(3n) {
        animation-delay: 0.1s;
      }

      /* Navigation button underline animation */
      nav a {
        position: relative;
        display: inline-block;
      }

      nav a::after {
        content: '';
        position: absolute;
        bottom: -4px;
        left: 0;
        width: 0;
        height: 2px;
        background: linear-gradient(90deg, #3b82f6, #8b5cf6);
        transition: width 0.3s ease;
      }

      nav a:hover::after {
        width: 100%;
      }

      /* Skill button animation matching nav buttons */
      .skill-btn {
        position: relative;
        display: inline-block;
        padding: 10px 20px;
        border-radius: 9999px;
        background: linear-gradient(135deg, rgba(59, 130, 246, 0.1), rgba(139, 92, 246, 0.1));
        border: 1px solid rgba(59, 130, 246, 0.3);
        transition: all 0.3s ease;
        overflow: hidden;
      }

      .dark .skill-btn {
        background: linear-gradient(135deg, rgba(59, 130, 246, 0.15), rgba(139, 92, 246, 0.15));
        border: 1px solid rgba(59, 130, 246, 0.4);
      }

      .skill-btn::before {
        content: '';
        position: absolute;
        bottom: 0;
        left: 0;
        width: 0;
        height: 2px;
        background: linear-gradient(90deg, #3b82f6, #8b5cf6);
        transition: width 0.3s ease;
      }

      .skill-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
      }

      .skill-btn:hover::before {
        width: 100%;
      }

      /* Back to top button */
      #back-to-top {
        position: fixed;
        bottom: 30px;
        right: 30px;
        width: 50px;
        height: 50px;
        background: linear-gradient(135deg, #3b82f6, #8b5cf6);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        visibility: hidden;
        transform: scale(0);
        transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        box-shadow: 0 4px 20px rgba(59, 130, 246, 0.4);
        z-index: 999;
      }

      #back-to-top.show {
        opacity: 1;
        visibility: visible;
        transform: scale(1);
      }

      #back-to-top:hover {
        transform: scale(1.1) translateY(-3px);
        box-shadow: 0 6px 25px rgba(59, 130, 246, 0.6);
      }

      #back-to-top svg {
        width: 24px;
        height: 24px;
        color: white;
      }

      /* Mobile optimization */
      @media (max-width: 640px) {
        #back-to-top {
          bottom: 20px;
          right: 20px;
          width: 45px;
          height: 45px;
        }
      }

      /* Ensure animations work on all devices */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }

      /* Failsafe for broken animations */
      .scroll-reveal.revealed,
      .scroll-reveal-scale.revealed,
      .scroll-reveal-left.revealed,
      .scroll-reveal-right.revealed {
        opacity: 1 !important;
        transform: none !important;
      }
    </style>
  </head>
  <body class="bg-white dark:bg-gray-900 text-gray-900 dark:text-white font-space-grotesk">
    <!-- Loading Screen -->
    <div id="loading-screen">
      <div class="loading-title">SHRENIK PILLAI</div>
      <div class="loading-bar-container">
        <div class="loading-bar" id="loading-bar"></div>
      </div>
      <div class="loading-text" id="loading-text">INITIALIZING...</div>
    </div>

    <!-- Starfield Background -->
    <div id="starfield"></div>

    <!-- Vector Background for Light Mode -->
    <div id="vector-bg">
      <div class="vector-shape vector-circle" style="top: 10%; left: 5%; animation: float 8s ease-in-out infinite;"></div>
      <div class="vector-shape vector-triangle" style="top: 60%; right: 10%; animation: float 10s ease-in-out infinite 2s;"></div>
      <div class="vector-shape vector-square" style="bottom: 20%; left: 15%; animation: float 12s ease-in-out infinite 4s;"></div>
      <div class="vector-shape vector-circle" style="top: 40%; right: 20%; width: 200px; height: 200px; animation: float 9s ease-in-out infinite 1s;"></div>
      <div class="vector-shape vector-square" style="top: 25%; left: 60%; width: 150px; height: 150px; animation: float 11s ease-in-out infinite 3s;"></div>
    </div>

    <!-- Back to Top Button -->
    <button id="back-to-top" aria-label="Back to top">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18" />
      </svg>
    </button>

    <div id="app" class="min-h-screen"></div>

    <script>
      let starfield = null;
      let loadingManager = null;
      let scrollAnimationManager = null;

      class LoadingManager {
        constructor() {
          this.screen = document.getElementById('loading-screen');
          this.bar = document.getElementById('loading-bar');
          this.text = document.getElementById('loading-text');
          this.progress = 0;
        }

        updateProgress(value) {
          try {
            this.progress = Math.min(value, 100);
            if (this.bar) this.bar.style.width = this.progress + '%';
            
            if (this.text) {
              if (this.progress < 30) this.text.textContent = 'INITIALIZING...';
              else if (this.progress < 60) this.text.textContent = 'LOADING ASSETS...';
              else if (this.progress < 90) this.text.textContent = 'PREPARING INTERFACE...';
              else this.text.textContent = 'ALMOST READY...';
            }
          } catch (e) {
            console.warn('Loading progress update failed:', e);
          }
        }

        complete() {
          try {
            this.updateProgress(100);
            setTimeout(() => {
              if (this.screen) {
                this.screen.style.opacity = '0';
                this.screen.style.transition = 'opacity 0.5s ease-out';
                setTimeout(() => {
                  if (this.screen) this.screen.style.display = 'none';
                }, 500);
              }
            }, 300);
          } catch (e) {
            console.warn('Loading completion failed:', e);
            if (this.screen) this.screen.style.display = 'none';
          }
        }
      }

      class StarfieldSystem {
        constructor() {
          try {
            this.container = document.getElementById('starfield');
            if (!this.container) return;
            
            this.stars = [];
            this.starCount = window.innerWidth < 768 ? 50 : 100;
            this.createStars();
            
            window.addEventListener('resize', () => this.handleResize());
          } catch (e) {
            console.warn('Starfield initialization failed:', e);
          }
        }

        createStars() {
          try {
            if (!this.container) return;
            this.container.innerHTML = '';
            this.stars = [];
            
            for (let i = 0; i < this.starCount; i++) {
              const star = document.createElement('div');
              star.className = 'star';
              const size = Math.random() * 2 + 1;
              star.style.width = size + 'px';
              star.style.height = size + 'px';
              star.style.left = Math.random() * 100 + '%';
              star.style.top = Math.random() * 100 + '%';
              star.style.animationDelay = Math.random() * 3 + 's';
              star.style.animationDuration = (Math.random() * 2 + 2) + 's';
              
              this.container.appendChild(star);
              this.stars.push(star);
            }
          } catch (e) {
            console.warn('Star creation failed:', e);
          }
        }

        handleResize() {
          try {
            const newStarCount = window.innerWidth < 768 ? 50 : 100;
            if (newStarCount !== this.starCount) {
              this.starCount = newStarCount;
              this.createStars();
            }
          } catch (e) {
            console.warn('Starfield resize failed:', e);
          }
        }
      }

      class ScrollAnimationManager {
        constructor() {
          try {
            this.elements = [];
            this.lastScrollY = window.scrollY;
            this.isScrollingDown = true;
            this.ticking = false;
            
            this.observeElements();
            this.handleScroll();
            
            window.addEventListener('scroll', () => {
              if (!this.ticking) {
                window.requestAnimationFrame(() => {
                  this.handleScroll();
                  this.ticking = false;
                });
                this.ticking = true;
              }
            }, { passive: true });
            
            window.addEventListener('resize', () => this.observeElements());
          } catch (e) {
            console.warn('ScrollAnimationManager initialization failed:', e);
          }
        }

        observeElements() {
          try {
            this.elements = Array.from(document.querySelectorAll('.scroll-reveal, .scroll-reveal-scale, .scroll-reveal-left, .scroll-reveal-right'));
          } catch (e) {
            console.warn('Element observation failed:', e);
          }
        }

        handleScroll() {
          try {
            const currentScrollY = window.scrollY;
            this.isScrollingDown = currentScrollY > this.lastScrollY;
            this.lastScrollY = currentScrollY;

            const windowHeight = window.innerHeight;
            const triggerPoint = windowHeight * 0.85;

            this.elements.forEach(element => {
              try {
                const rect = element.getBoundingClientRect();
                const elementTop = rect.top;
                const elementBottom = rect.bottom;

                // Element is in viewport
                if (this.isScrollingDown) {
                  // Scrolling down - reveal when entering from bottom
                  if (elementTop < triggerPoint && elementBottom > 0) {
                    element.classList.add('revealed');
                    element.classList.remove('un-revealed');
                  }
                } else {
                  // Scrolling up - reveal when entering from top
                  if (elementTop < windowHeight && elementBottom > windowHeight * 0.15) {
                    element.classList.add('revealed');
                    element.classList.remove('un-revealed');
                  }
                }

                // Remove revealed state when element is completely out of viewport
                if (elementBottom < 0 || elementTop > windowHeight) {
                  element.classList.remove('revealed');
                  element.classList.add('un-revealed');
                }
              } catch (e) {
                console.warn('Element animation failed:', e);
                // Failsafe: ensure element is visible
                element.classList.add('revealed');
              }
            });

            // Handle back-to-top button
            const backToTop = document.getElementById('back-to-top');
            if (backToTop) {
              if (currentScrollY > 300) {
                backToTop.classList.add('show');
              } else {
                backToTop.classList.remove('show');
              }
            }
          } catch (e) {
            console.warn('Scroll handling failed:', e);
          }
        }
      }

      function setupTheme() {
        try {
          const toggle = document.getElementById("theme-toggle");
          if (!toggle) return;

          const savedTheme = localStorage.getItem("theme");
          const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          const initialTheme = savedTheme || (prefersDark ? "dark" : "light");

          if (initialTheme === "dark") {
            document.documentElement.classList.add("dark");

          let ctaButtonsHTML = "";
          if (data.sections.hero && data.sections.hero.enabled && data.sections.hero.ctaButtons) {
            ctaButtonsHTML = (data.sections.hero.ctaButtons || [])
              .map((btn, index) => {
                const isPrimary = index === 0;
                return `
      <a href="${ensureUrl(btn.url)}" class="${isPrimary ? 'bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 text-white' : 'border-2 border-blue-600 dark:border-blue-400 text-blue-600 dark:text-blue-400 hover:bg-blue-600 dark:hover:bg-blue-400 hover:text-white'} font-bold py-3 px-8 rounded-lg transition-all duration-300 transform hover:scale-105 shadow-lg hover:shadow-2xl scroll-reveal">
        ${btn.text}
      </a>
                `;
              })
              .join("");
          }

          const wrappedName = wrapHeadingText(data.settings.name);
          
          const content = `
      ${headerHTML}
      <main class="relative">
        <header class="min-h-screen flex items-center justify-center py-12 sm:py-16 px-4">
            <div class="container mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex flex-col lg:flex-row items-center gap-8 lg:gap-16">
                    <div class="w-48 h-48 sm:w-64 sm:h-64 rounded-full overflow-hidden border-4 border-blue-500 shadow-2xl scroll-reveal-scale">
                        <img src="${data.settings.profileImage}" alt="${data.settings.name}" class="w-full h-full object-cover" />
                    </div>
                    <div class="flex-1 text-center lg:text-left">
                        <h1 class="text-3xl sm:text-4xl lg:text-6xl font-bold mb-4 scroll-reveal">
                            <span class="heading-quirky inline-block font-orbitron bg-gradient-to-r from-blue-600 to-purple-600 dark:from-blue-400 dark:to-purple-400 bg-clip-text text-transparent">${wrappedName}</span>
                        </h1>
                        <p class="text-xl sm:text-2xl lg:text-3xl mb-4 text-gray-700 dark:text-gray-300 scroll-reveal">${data.settings.title}</p>
                        <p class="text-base sm:text-lg text-gray-600 dark:text-gray-400 mb-4 scroll-reveal">${data.settings.location}</p>
                        <p class="text-base sm:text-lg text-gray-700 dark:text-gray-300 max-w-2xl mb-8 scroll-reveal">${data.settings.summary}</p>
                        <div class="flex flex-wrap gap-4 mt-8 justify-center lg:justify-start">
                         ${ctaButtonsHTML}
                       </div>
                   </div>
               </div>
            </div>
        </header>

        ${aboutHTML}
        ${skillsHTML}
        ${projectsHTML}
        ${experienceHTML}
        ${educationHTML}
        ${achievementsHTML}
        ${contactHTML}

      </main>
      ${footerHTML}
    </div>
    `;

          document.getElementById("app").innerHTML = content;
          
          loadingManager.updateProgress(95);
          
          setupTheme();
          
          // Setup mobile theme toggle
          const mobileToggle = document.getElementById("theme-toggle-mobile");
          if (mobileToggle) {
            const updateMobileToggle = () => {
              const isDark = document.documentElement.classList.contains("dark");
              mobileToggle.innerHTML = isDark
                ? `<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>`
                : `<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>`;
            };
            
            updateMobileToggle();
            
            mobileToggle.addEventListener("click", () => {
              const isDark = document.documentElement.classList.toggle("dark");
              localStorage.setItem("theme", isDark ? "dark" : "light");
              updateMobileToggle();
              const desktopToggle = document.getElementById("theme-toggle");
              if (desktopToggle) {
                desktopToggle.innerHTML = isDark
                  ? `<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>`
                  : `<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>`;
              }
            });
          }
          
          // Initialize scroll animations
          scrollAnimationManager = new ScrollAnimationManager();

          // Back to top button functionality
          const backToTopBtn = document.getElementById('back-to-top');
          if (backToTopBtn) {
            backToTopBtn.addEventListener('click', (e) => {
              e.preventDefault();
              window.scrollTo({
                top: 0,
                behavior: 'smooth'
              });
            });
          }

          try {
            const personSchema = {
              "@context": "https://schema.org",
              "@type": "Person",
              name: data.settings.name,
              jobTitle: data.settings.title,
              description: data.settings.summary,
              image: data.settings.profileImage,
              url: window.location.href,
              sameAs: (data.sections.social?.items || []).map((s) => ensureUrl(s.url)),
              address: {
                "@type": "PostalAddress",
                addressLocality: data.settings.location,
              },
            };
            const ld = document.createElement("script");
            ld.type = "application/ld+json";
            ld.textContent = JSON.stringify(personSchema);
            document.head.appendChild(ld);
          } catch (e) {
            console.warn("JSON-LD injection failed", e);
          }

          document.querySelectorAll('a[href^="#"]').forEach((anchor) => {
            anchor.addEventListener("click", function (e) {
              e.preventDefault();
              const targetId = this.getAttribute("href");
              if (targetId === "#") {
                window.scrollTo({ top: 0, behavior: "smooth" });
                return;
              }
              const targetElement = document.querySelector(targetId);
              if (targetElement) {
                targetElement.scrollIntoView({ behavior: "smooth", block: "start" });
              }
            });
          });

          const hamburgerMenu = document.getElementById("hamburger-menu");
          const sidebar = document.getElementById("mobile-sidebar");

          function closeSidebar() {
            if (sidebar) {
              sidebar.classList.add("-translate-x-full");
            }
          }

          if (hamburgerMenu && sidebar) {
            hamburgerMenu.addEventListener("click", () => {
              const isOpen = !sidebar.classList.contains("-translate-x-full");
              if (isOpen) {
                closeSidebar();
              } else {
                sidebar.classList.remove("-translate-x-full");
              }
            });

            sidebar.querySelectorAll("a").forEach((link) => {
              link.addEventListener("click", () => {
                closeSidebar();
              });
            });

            document.addEventListener("click", (event) => {
              if (!sidebar.contains(event.target) && !hamburgerMenu.contains(event.target)) {
                closeSidebar();
              }
            });

            document.addEventListener("keydown", (event) => {
              if (event.key === "Escape") {
                closeSidebar();
              }
            });
          }
          
          loadingManager.complete();
        } catch (err) {
          document.getElementById("app").innerHTML = `<div class="text-red-500 p-8 text-center">Error: ${err.message}</div>`;
          console.error(err);
          loadingManager.complete();
        }
      }

      function handleContactForm(event) {
        try {
          event.preventDefault();
          const form = event.target;
          
          const successMsg = document.createElement('div');
          successMsg.className = 'fixed top-20 left-1/2 -translate-x-1/2 z-50 bg-gradient-to-r from-green-500 to-emerald-600 text-white px-6 py-3 rounded-lg shadow-2xl animate-slide-up font-orbitron';
          successMsg.textContent = '✓ MESSAGE SENT SUCCESSFULLY';
          document.body.appendChild(successMsg);
          
          setTimeout(() => {
            successMsg.style.animation = 'fadeOut 0.5s ease-out forwards';
            setTimeout(() => successMsg.remove(), 500);
          }, 4000);
          
          form.reset();
        } catch (e) {
          console.warn('Form submission handling failed:', e);
        }
      }

      document.addEventListener("DOMContentLoaded", () => {
        try {
          loadingManager = new LoadingManager();
          loadingManager.updateProgress(10);
          
          starfield = new StarfieldSystem();
          loadingManager.updateProgress(20);
          
          renderPortfolio();
        } catch (e) {
          console.error('Initialization failed:', e);
          document.getElementById('loading-screen').style.display = 'none';
          document.getElementById("app").innerHTML = `<div class="text-red-500 p-8 text-center">Failed to initialize portfolio. Please refresh the page.</div>`;
        }
      });
    </script>
  </body>
</html>

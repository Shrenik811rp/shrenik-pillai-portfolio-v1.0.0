<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Shrenik Pillai - Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              "space-grotesk": ["Space Grotesk", "sans-serif"],
              "orbitron": ["Orbitron", "sans-serif"],
            },
            animation: {
              "float": "float 8s ease-in-out infinite",
              "shimmer": "shimmer 2s linear infinite",
            },
            keyframes: {
              float: {
                "0%, 100%": { transform: "translateY(0px)" },
                "50%": { transform: "translateY(-20px)" },
              },
              shimmer: {
                "0%": { backgroundPosition: "-1000px 0" },
                "100%": { backgroundPosition: "1000px 0" },
              },
            },
          },
        },
        darkMode: "selector",
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Orbitron:wght@400;500;700;900&display=swap" rel="stylesheet"/>
    <link rel="canonical" href="" id="canonical-link" />
    <style>
      * {
        transition: background-color 0.3s ease, border-color 0.3s ease;
      }

      /* FIXED: Removed height: 100% to allow desktop scrolling to register properly */
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
      }

      body {
        overflow-x: hidden; /* Prevents horizontal scrollbar during flip animations */
        position: relative;
        min-height: 100vh;
      }

      ::selection {
        background-color: rgba(59, 130, 246, 0.3);
        color: inherit;
      }

      /* Loading Screen */
      #loading-screen {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 30px;
        padding: 20px;
      }

      .loading-title {
        font-family: 'Orbitron', sans-serif;
        font-size: clamp(1.5rem, 5vw, 2.5rem);
        font-weight: 900;
        color: #3b82f6;
        text-shadow: 0 0 20px rgba(59, 130, 246, 0.8);
        letter-spacing: 4px;
        text-align: center;
        word-break: break-word;
      }

      .loading-bar-container {
        width: min(400px, 90vw);
        max-width: 400px;
        height: 30px;
        background: rgba(255, 255, 255, 0.1);
        border: 2px solid #3b82f6;
        border-radius: 15px;
        overflow: hidden;
        box-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
      }

      .loading-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #3b82f6, #8b5cf6, #3b82f6);
        background-size: 200% 100%;
        animation: shimmer 2s linear infinite;
        transition: width 0.3s ease;
      }

      .loading-text {
        font-family: 'Orbitron', sans-serif;
        font-size: clamp(0.875rem, 3vw, 1rem);
        color: #93c5fd;
        letter-spacing: 2px;
        text-align: center;
      }

      /* Starfield Background */
      #starfield {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        pointer-events: none;
      }

      .star {
        position: absolute;
        background: white;
        border-radius: 50%;
        opacity: 0.8;
        animation: twinkle 3s infinite ease-in-out;
      }

      @keyframes twinkle {
        0%, 100% { opacity: 0.3; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.2); }
      }

      /* Vector Background */
      body:not(.dark) #vector-bg {
        display: block;
      }
      body.dark #vector-bg {
        display: none;
      }
      #vector-bg {
        position: fixed;
        inset: 0;
        z-index: -2;
        pointer-events: none;
        overflow: hidden;
        opacity: 0.4;
      }
      .ambient-blob {
        position: absolute;
        filter: blur(60px);
        border-radius: 50%;
        animation: float 10s ease-in-out infinite;
        opacity: 0.5;
      }

      /* ========================================= */
      /* SCROLL ANIMATIONS (180 DEGREE FLIPS)      */
      /* ========================================= */
      .scroll-reveal,
      .scroll-flip-left,
      .scroll-flip-right {
        opacity: 0;
        /* 1.2s to 1.5s duration makes it prominent and noticeable */
        transition: opacity 1.2s cubic-bezier(0.23, 1, 0.32, 1), transform 1.5s cubic-bezier(0.23, 1, 0.32, 1);
        will-change: opacity, transform;
        transform-style: preserve-3d;
      }

      /* Off-screen states */
      .scroll-reveal.un-revealed { 
        transform: translateY(60px) scale(0.95); 
        opacity: 0; 
      }
      .scroll-flip-left.un-revealed { 
        /* Start flipped backwards 180deg, pushed left, slightly smaller */
        transform: perspective(2500px) rotateY(-180deg) translateX(-150px) scale(0.85); 
        opacity: 0; 
      }
      .scroll-flip-right.un-revealed { 
        /* Start flipped backwards 180deg, pushed right, slightly smaller */
        transform: perspective(2500px) rotateY(180deg) translateX(150px) scale(0.85); 
        opacity: 0; 
      }

      /* On-screen states (Snapped to normal) */
      .scroll-reveal.revealed,
      .scroll-flip-left.revealed,
      .scroll-flip-right.revealed {
        opacity: 1;
        transform: perspective(2500px) rotateY(0deg) translateX(0px) translateY(0px) scale(1);
      }

      /* ========================================= */
      /* NEW, GLITCH-FREE SIMPLE HOVER ANIMATION   */
      /* ========================================= */
      .heading-hover {
        display: inline-block;
        transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        transform-origin: center;
      }
      .heading-hover:hover {
        /* Simple, elegant 3D pop. Doesn't interfere with the transparent text background! */
        transform: scale(1.08) translateY(-3px);
      }

      /* Underlines */
      nav a, .skill-btn {
        position: relative;
        display: inline-block;
        padding: 8px 16px;
        transition: color 0.3s ease;
      }
      .skill-btn {
        font-weight: 500;
      }
      nav a::after, .skill-btn::after {
        content: '';
        position: absolute;
        bottom: 0px;
        left: 0;
        width: 0;
        height: 2px;
        background: linear-gradient(90deg, #3b82f6, #8b5cf6);
        transition: width 0.3s ease;
      }
      nav a:hover::after, .skill-btn:hover::after {
        width: 100%;
      }

      /* Back to top button */
      #back-to-top {
        position: fixed;
        bottom: 30px;
        right: 30px;
        width: 50px;
        height: 50px;
        background: linear-gradient(135deg, #3b82f6, #8b5cf6);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        visibility: hidden;
        transform: scale(0);
        transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        box-shadow: 0 4px 20px rgba(59, 130, 246, 0.4);
        z-index: 999;
      }

      #back-to-top.show {
        opacity: 1;
        visibility: visible;
        transform: scale(1);
      }

      #back-to-top:hover {
        transform: scale(1.1) translateY(-3px);
        box-shadow: 0 6px 25px rgba(59, 130, 246, 0.6);
      }

      #back-to-top svg {
        width: 24px;
        height: 24px;
        color: white;
      }

      @media (max-width: 640px) {
        #back-to-top {
          bottom: 20px;
          right: 20px;
          width: 45px;
          height: 45px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
        .scroll-reveal, .scroll-flip-left, .scroll-flip-right {
           opacity: 1 !important;
           transform: none !important;
        }
      }
    </style>
  </head>
  <body class="bg-white dark:bg-gray-900 text-gray-900 dark:text-white font-space-grotesk">
    <div id="loading-screen">
      <div class="loading-title">SHRENIK PILLAI</div>
      <div class="loading-bar-container">
        <div class="loading-bar" id="loading-bar"></div>
      </div>
      <div class="loading-text" id="loading-text">INITIALIZING...</div>
    </div>

    <div id="starfield"></div>

    <div id="vector-bg">
      <div class="ambient-blob bg-blue-300 w-64 h-64 top-[10%] left-[5%]" style="animation-duration: 12s;"></div>
      <div class="ambient-blob bg-yellow-200 w-80 h-80 top-[45%] right-[10%]" style="animation-duration: 15s; animation-delay: -2s;"></div>
      <div class="ambient-blob bg-red-200 w-56 h-56 bottom-[10%] left-[20%]" style="animation-duration: 14s; animation-delay: -5s;"></div>
      <div class="ambient-blob bg-green-200 w-72 h-72 top-[20%] right-[30%]" style="animation-duration: 16s; animation-delay: -7s;"></div>
    </div>

    <button id="back-to-top" aria-label="Back to top">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18" />
      </svg>
    </button>

    <div id="app" class="min-h-screen"></div>

    <script>
      let loadingManager = null;
      let observer = null;

      class LoadingManager {
        constructor() {
          this.screen = document.getElementById('loading-screen');
          this.bar = document.getElementById('loading-bar');
          this.text = document.getElementById('loading-text');
          this.progress = 0;
        }

        updateProgress(value) {
          try {
            this.progress = Math.min(value, 100);
            if (this.bar) this.bar.style.width = this.progress + '%';
            
            if (this.text) {
              if (this.progress < 30) this.text.textContent = 'INITIALIZING...';
              else if (this.progress < 60) this.text.textContent = 'LOADING ASSETS...';
              else if (this.progress < 90) this.text.textContent = 'PREPARING INTERFACE...';
              else this.text.textContent = 'ALMOST READY...';
            }
          } catch (e) {}
        }

        complete() {
          try {
            this.updateProgress(100);
            setTimeout(() => {
              if (this.screen) {
                this.screen.style.opacity = '0';
                this.screen.style.transition = 'opacity 0.5s ease-out';
                setTimeout(() => {
                  if (this.screen) this.screen.style.display = 'none';
                }, 500);
              }
            }, 300);
          } catch (e) {}
        }
      }

      class StarfieldSystem {
        constructor() {
          try {
            this.container = document.getElementById('starfield');
            if (!this.container) return;
            this.stars = [];
            this.starCount = window.innerWidth < 768 ? 40 : 80;
            this.createStars();
            window.addEventListener('resize', () => this.handleResize());
          } catch (e) {}
        }

        createStars() {
          try {
            if (!this.container) return;
            this.container.innerHTML = '';
            for (let i = 0; i < this.starCount; i++) {
              const star = document.createElement('div');
              star.className = 'star';
              const size = Math.random() * 2 + 1;
              star.style.width = size + 'px';
              star.style.height = size + 'px';
              star.style.left = Math.random() * 100 + '%';
              star.style.top = Math.random() * 100 + '%';
              star.style.animationDelay = Math.random() * 3 + 's';
              star.style.animationDuration = (Math.random() * 2 + 2) + 's';
              star.style.display = document.documentElement.classList.contains('dark') ? 'block' : 'none';
              this.container.appendChild(star);
            }
          } catch (e) {}
        }

        handleResize() {
          try {
            const newStarCount = window.innerWidth < 768 ? 40 : 80;
            if (newStarCount !== this.starCount) {
              this.starCount = newStarCount;
              this.createStars();
            }
          } catch (e) {}
        }
      }

      function initScrollObserver() {
        if (observer) observer.disconnect();
        
        observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              entry.target.classList.add('revealed');
              entry.target.classList.remove('un-revealed');
            } else {
              // Un-reveal when it leaves viewport so it replays infinitely
              entry.target.classList.remove('revealed');
              entry.target.classList.add('un-revealed');
            }
          });
        }, {
          root: null,
          // Lowered threshold to 5% so it works perfectly at high zooms or huge desktop screens
          threshold: 0.05, 
          rootMargin: "0px"
        });

        // Add 'un-revealed' initially and observe
        const elements = document.querySelectorAll('.scroll-reveal, .scroll-flip-left, .scroll-flip-right');
        elements.forEach(el => {
            el.classList.add('un-revealed');
            observer.observe(el);
        });

        window.addEventListener('scroll', () => {
          const backToTop = document.getElementById('back-to-top');
          if (backToTop) {
            if (window.scrollY > 300) {
              backToTop.classList.add('show');
            } else {
              backToTop.classList.remove('show');
            }
          }
        }, { passive: true });
      }

      function setupTheme() {
        try {
          const toggle = document.getElementById("theme-toggle");
          if (!toggle) return;

          const savedTheme = localStorage.getItem("theme");
          const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          const initialTheme = savedTheme || (prefersDark ? "dark" : "light");

          const updateIconsAndStars = (isDark) => {
             const iconSvg = isDark
                ? `<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>`
                : `<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>`;
             if(toggle) toggle.innerHTML = iconSvg;
             const stars = document.querySelectorAll('.star');
             stars.forEach(star => { star.style.display = isDark ? 'block' : 'none'; });
          };

          if (initialTheme === "dark") {
            document.documentElement.classList.add("dark");
          } else {
            document.documentElement.classList.remove("dark");
          }
          updateIconsAndStars(initialTheme === "dark");

          toggle.addEventListener("click", () => {
              const isDark = document.documentElement.classList.toggle("dark");
              localStorage.setItem("theme", isDark ? "dark" : "light");
              updateIconsAndStars(isDark);
          });
        } catch (e) {}
      }

      function ensureUrl(val) {
        if (!val) return "";
        if (val.startsWith("http://") || val.startsWith("https://") || val.startsWith("mailto:") || val.startsWith("./")) return val;
        return val;
      }

      function createSectionDivider(title) {
        return `
          <h2 class="text-2xl sm:text-3xl font-bold text-center mb-8 sm:mb-12 scroll-reveal">
            <span class="heading-hover font-orbitron bg-gradient-to-r from-blue-600 to-purple-600 dark:from-blue-400 dark:to-purple-400 bg-clip-text text-transparent">${title}</span>
          </h2>
        `;
      }

      async function renderPortfolio() {
        try {
          loadingManager.updateProgress(30);

          const response = await fetch("./portfolio-data.json");
          if (!response.ok) throw new Error("Failed to load portfolio data");
          const data = await response.json();

          loadingManager.updateProgress(50);

          const canonicalLink = document.getElementById("canonical-link");
          if (canonicalLink) canonicalLink.href = window.location.href;

          document.title = `${data.settings.name} - ${data.settings.title}`;

          let headerHTML = "";
          if (data.navigation && data.navigation.enabled) {
            const navItems = (data.navigation.items || [])
              .map(
                (item) =>
                  `<a href="${ensureUrl(item.url)}" class="text-gray-700 dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400 font-medium">${item.name}</a>`
              )
              .join("");

            headerHTML = `
      <nav class="sticky top-0 z-50 bg-white/80 dark:bg-gray-900/80 backdrop-blur-md border-b border-gray-200 dark:border-gray-800">
        <div class="container mx-auto px-4 sm:px-6 lg:px-8 py-4 flex items-center justify-between">
          <a href="#" class="text-xl sm:text-2xl font-bold font-orbitron bg-gradient-to-r from-blue-600 to-purple-600 dark:from-blue-400 dark:to-purple-400 bg-clip-text text-transparent heading-hover">
            ${data.settings.name.split(' ')[0]}
          </a>
          <div class="hidden lg:flex items-center gap-6 font-medium">
            ${navItems}
          </div>
          <div class="flex items-center gap-4">
            <button id="theme-toggle" class="p-2 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-800 transition-colors" aria-label="Toggle theme"></button>
            <button id="hamburger-menu" class="lg:hidden p-2 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-800 transition-colors" aria-label="Menu">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
              </svg>
            </button>
          </div>
        </div>
      </nav>
      <aside id="mobile-sidebar" class="fixed top-0 left-0 h-full w-64 bg-white dark:bg-gray-900 border-r border-gray-200 dark:border-gray-800 z-50 transform -translate-x-full transition-transform duration-300 lg:hidden shadow-2xl">
        <div class="p-6 flex flex-col gap-6">
          <div class="flex items-center justify-between">
            <span class="text-xl font-bold font-orbitron bg-gradient-to-r from-blue-600 to-purple-600 dark:from-blue-400 dark:to-purple-400 bg-clip-text text-transparent">Menu</span>
            <button id="theme-toggle-mobile" class="p-2 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-800 transition-colors" aria-label="Toggle theme"></button>
          </div>
          <div class="flex flex-col gap-4 text-lg font-medium">
            ${navItems.replace(/class="/g, 'class="block py-2 ')}
          </div>
        </div>
      </aside>
            `;
          }

          let footerHTML = "";
          if (data.footer && data.footer.enabled) {
            footerHTML = `
      <footer class="bg-gray-100 dark:bg-gray-800 py-8 mt-16">
        <div class="container mx-auto px-4 sm:px-6 lg:px-8 text-center text-gray-600 dark:text-gray-400">
          <p>${data.footer.copyright}</p>
        </div>
      </footer>
            `;
          }

          let aboutHTML = "";
          if (data.sections.about && data.sections.about.enabled) {
            aboutHTML = `
      <section id="about" class="py-12 sm:py-16 overflow-hidden">
        <div class="container mx-auto px-4 sm:px-6 lg:px-8">
          ${createSectionDivider("About Me")}
          <div class="max-w-3xl mx-auto scroll-reveal">
            <p class="text-base sm:text-lg text-gray-700 dark:text-gray-300 leading-relaxed text-center sm:text-left">
              ${data.sections.about.content}
            </p>
          </div>
        </div>
      </section>
            `;
          }

          let skillsHTML = "";
          if (data.sections.about && data.sections.about.skills && data.sections.about.skills.enabled) {
            const skillsItemsHTML = (data.sections.about.skills.items || [])
              .map((skill, index) => {
                const delay = (index % 10) * 0.05;
                return `<span class="skill-btn text-sm sm:text-base text-gray-800 dark:text-gray-200 scroll-reveal" style="transition-delay: ${delay}s">${skill}</span>`;
              })
              .join("");

            skillsHTML = `
      <section id="skills" class="py-12 sm:py-16 bg-gray-50/50 dark:bg-gray-800/50 backdrop-blur-sm overflow-hidden">
        <div class="container mx-auto px-4 sm:px-6 lg:px-8">
          ${createSectionDivider(data.sections.about.skills.title)}
          <div class="flex flex-wrap gap-4 sm:gap-6 justify-center max-w-5xl mx-auto">
            ${skillsItemsHTML}
          </div>
        </div>
      </section>
            `;
          }

          let projectsHTML = "";
          if (data.sections.projects && data.sections.projects.enabled) {
            const projectsItemsHTML = (data.sections.projects.items || [])
              .map((project, index) => {
                const tagsHTML = (project.tags || [])
                  .map(tag => `<span class="px-3 py-1 text-xs font-medium bg-blue-100 dark:bg-blue-900/30 text-blue-800 dark:text-blue-300 rounded-full">${tag}</span>`)
                  .join("");
                
                const animClass = index % 2 === 0 ? 'scroll-flip-left' : 'scroll-flip-right';
                
                return `
      <div class="bg-white/90 dark:bg-gray-800/90 backdrop-blur-md rounded-xl p-6 shadow-lg hover:shadow-2xl border border-gray-200 dark:border-gray-700 ${animClass}">
        <h3 class="text-xl font-bold mb-3 font-orbitron bg-gradient-to-r from-blue-600 to-purple-600 dark:from-blue-400 dark:to-purple-400 bg-clip-text text-transparent heading-hover">
          ${project.title}
        </h3>
        <p class="text-gray-700 dark:text-gray-300 mb-4 leading-relaxed">${project.description}</p>
        <div class="flex flex-wrap gap-2 mb-4">
          ${tagsHTML}
        </div>
        ${project.repoUrl ? `<a href="${ensureUrl(project.repoUrl)}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-2 text-blue-600 dark:text-blue-400 hover:underline font-medium">
          <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
          View on GitHub
        </a>` : ''}
      </div>
                `;
              })
              .join("");

            projectsHTML = `
      <section id="projects" class="py-12 sm:py-16 overflow-hidden">
        <div class="container mx-auto px-4 sm:px-6 lg:px-8">

                const isPrimary = index === 0;
                return `
      <a href="${ensureUrl(btn.url)}" class="${isPrimary ? 'bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 text-white' : 'border-2 border-blue-600 dark:border-blue-400 text-blue-600 dark:text-blue-400 hover:bg-blue-600 dark:hover:bg-blue-400 hover:text-white'} font-bold py-3 px-8 rounded-lg transition-all duration-300 transform hover:scale-105 shadow-lg hover:shadow-2xl scroll-reveal">
        ${btn.text}

              })

          const content = `
      ${headerHTML}

                         ${ctaButtonsHTML}
                       </div>
                   </div>
               </div>
            </div>
        </header>

        ${aboutHTML}
        ${skillsHTML}
        ${projectsHTML}
        ${experienceHTML}
        ${educationHTML}
        ${achievementsHTML}
        ${contactHTML}

      </main>
      ${footerHTML}
    `;

          document.getElementById("app").innerHTML = content;
          loadingManager.updateProgress(95);
          
          setupTheme();
          
          const mobileToggle = document.getElementById("theme-toggle-mobile");
          if (mobileToggle) {
            const updateMobileToggle = () => {
              const isDark = document.documentElement.classList.contains("dark");
              mobileToggle.innerHTML = isDark
                ? `<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>`
                : `<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>`;
            };
            
            updateMobileToggle();
            mobileToggle.addEventListener("click", () => {
              const isDark = document.documentElement.classList.toggle("dark");
              localStorage.setItem("theme", isDark ? "dark" : "light");
              updateMobileToggle();
              const desktopToggle = document.getElementById("theme-toggle");
              if (desktopToggle) {
                desktopToggle.innerHTML = isDark
                  ? `<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>`
                  : `<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>`;
              }
              const stars = document.querySelectorAll('.star');
              stars.forEach(star => { star.style.display = isDark ? 'block' : 'none'; });
            });
          }
          
          initScrollObserver();

          const backToTopBtn = document.getElementById('back-to-top');
          if (backToTopBtn) {
            backToTopBtn.addEventListener('click', (e) => {
              e.preventDefault();
              window.scrollTo({ top: 0, behavior: 'smooth' });
            });
          }

          document.querySelectorAll('a[href^="#"]').forEach((anchor) => {
            anchor.addEventListener("click", function (e) {
              e.preventDefault();
              const targetId = this.getAttribute("href");
              if (targetId === "#") {
                window.scrollTo({ top: 0, behavior: "smooth" });
                return;
              }
              const targetElement = document.querySelector(targetId);
              if (targetElement) {
                targetElement.scrollIntoView({ behavior: "smooth", block: "start" });
              }
            });
          });

          const hamburgerMenu = document.getElementById("hamburger-menu");
          const sidebar = document.getElementById("mobile-sidebar");

          function closeSidebar() {
            if (sidebar) sidebar.classList.add("-translate-x-full");
          }

          if (hamburgerMenu && sidebar) {
            hamburgerMenu.addEventListener("click", () => {
              if (!sidebar.classList.contains("-translate-x-full")) closeSidebar();
              else sidebar.classList.remove("-translate-x-full");
            });

            sidebar.querySelectorAll("a").forEach((link) => {
              link.addEventListener("click", closeSidebar);
            });

            document.addEventListener("click", (event) => {
              if (!sidebar.contains(event.target) && !hamburgerMenu.contains(event.target)) {
                closeSidebar();
              }
            });
          }
          
          loadingManager.complete();
        } catch (err) {
          document.getElementById("app").innerHTML = `<div class="text-red-500 p-8 text-center font-bold">Error Loading Portfolio</div>`;
          loadingManager.complete();
        }
      }

      function handleContactForm(event) {
        event.preventDefault();
        const successMsg = document.createElement('div');
        successMsg.className = 'fixed top-20 left-1/2 -translate-x-1/2 z-50 bg-gradient-to-r from-green-500 to-emerald-600 text-white px-6 py-3 rounded-lg shadow-2xl font-orbitron font-bold';
        successMsg.style.animation = 'float 3s ease-in-out infinite';
        successMsg.textContent = '✓ MESSAGE SENT SUCCESSFULLY';
        document.body.appendChild(successMsg);
        setTimeout(() => {
          successMsg.style.opacity = '0';
          successMsg.style.transition = 'opacity 0.5s ease-out';
          setTimeout(() => successMsg.remove(), 500);
        }, 4000);
        event.target.reset();
      }

      document.addEventListener("DOMContentLoaded", () => {
        new StarfieldSystem();
        loadingManager = new LoadingManager();
        loadingManager.updateProgress(10);
        renderPortfolio();
      });
    </script>
  </body>

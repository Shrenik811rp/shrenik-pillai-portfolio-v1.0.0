<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/tsparticles@3/tsparticles.bundle.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Space Grotesk', sans-serif; overflow-x: hidden; cursor: crosshair; }
    #tsparticles { position: fixed; inset: 0; z-index: 0; }
    .content { position: relative; z-index: 10; }
    .target:hover { outline: 2px solid rgba(255,0,0,0.5); outline-offset: 4px; transition: all 0.2s ease; }
    #loader { position: fixed; inset: 0; background: #0a0e27; color: #60a5fa; display: flex; align-items: center; justify-content: center; flex-direction: column; z-index: 9999; }
    .fade-out { opacity: 0; pointer-events: none; transition: opacity 0.6s ease; }
  </style>
</head>

<body class="bg-white dark:bg-[#0a0e27] text-gray-800 dark:text-gray-200">

<div id="loader">
  <h1 class="text-2xl mb-6">INITIALIZING PORTFOLIO...</h1>
  <div class="w-64 h-2 bg-gray-700 overflow-hidden">
    <div class="h-full bg-blue-400 animate-pulse w-full"></div>
  </div>
</div>

<div id="tsparticles"></div>

<div class="content max-w-5xl mx-auto p-6">
  <section class="text-center py-20">
    <img src="profile.jpg" class="mx-auto w-40 h-40 rounded-full mb-6 target"/>
    <h1 class="text-4xl font-bold mb-4">Your Name</h1>
    <p class="text-lg mb-8">Your Title • Location</p>
    <a href="#" class="px-6 py-3 border rounded-lg target">Download Resume</a>
  </section>

  <section class="py-20">
    <h2 class="text-3xl font-bold mb-8">Featured Projects</h2>
    <div class="grid md:grid-cols-2 gap-8">
      <div class="border p-6 rounded-lg target">
        <h3 class="text-xl font-semibold mb-2">Project Title</h3>
        <p class="mb-4">Project description goes here.</p>
        <a href="#" class="underline">View Code</a>
      </div>
    </div>
  </section>
</div>

<script>
  window.addEventListener('load', () => {
    document.getElementById('loader').classList.add('fade-out');
  });

  tsParticles.load("tsparticles", {
    background: { color: { value: "transparent" } },
    particles: {
      number: { value: 300 },
      color: { value: "#ffffff" },
      size: { value: 1.2 },
      move: { enable: true, speed: 0.2 },
      opacity: { value: 0.8 }
    }
  });
</script>

</body>
</html>

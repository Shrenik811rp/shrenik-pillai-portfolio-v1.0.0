<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shrenik Pillai - Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              "space-grotesk": ["Space Grotesk", "sans-serif"],
              "orbitron": ["Orbitron", "sans-serif"],
            },
            animation: {
              "blur-in": "blurIn 0.7s ease-out forwards",
              "fade-in": "fadeIn 0.5s ease-out forwards",
              "slide-up": "slideUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1)",
              "slide-in-left": "slideInLeft 0.8s cubic-bezier(0.34, 1.56, 0.64, 1)",
              "slide-in-right": "slideInRight 0.8s cubic-bezier(0.34, 1.56, 0.64, 1)",
              "scale-in": "scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)",
              "fade-in-scale": "fadeInScale 0.6s cubic-bezier(0.34, 1.56, 0.64, 1)",
              "float": "float 3s ease-in-out infinite",
              "pulse-glow": "pulseGlow 2s ease-in-out infinite",
              "rotate-in": "rotateIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1)",
              "swirl-in": "swirlIn 1s cubic-bezier(0.34, 1.56, 0.64, 1)",
              "flip-in": "flipIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1)",
              "shimmer": "shimmer 2s linear infinite",
            },
            keyframes: {
              blurIn: {
                "0%": { filter: "blur(5px)", opacity: "0" },
                "100%": { filter: "blur(0)", opacity: "1" },
              },
              fadeIn: {
                "0%": { opacity: "0", transform: "translateY(20px)" },
                "100%": { opacity: "1", transform: "translateY(0)" },
              },
              slideUp: {
                "0%": { opacity: "0", transform: "translateY(40px)" },
                "100%": { opacity: "1", transform: "translateY(0)" },
              },
              slideInLeft: {
                "0%": { opacity: "0", transform: "translateX(-60px) rotate(-5deg)" },
                "100%": { opacity: "1", transform: "translateX(0) rotate(0deg)" },
              },
              slideInRight: {
                "0%": { opacity: "0", transform: "translateX(60px) rotate(5deg)" },
                "100%": { opacity: "1", transform: "translateX(0) rotate(0deg)" },
              },
              scaleIn: {
                "0%": { opacity: "0", transform: "scale(0.8)" },
                "100%": { opacity: "1", transform: "scale(1)" },
              },
              fadeInScale: {
                "0%": { opacity: "0", transform: "scale(0.9) translateY(20px)" },
                "100%": { opacity: "1", transform: "scale(1) translateY(0)" },
              },
              float: {
                "0%, 100%": { transform: "translateY(0px)" },
                "50%": { transform: "translateY(-10px)" },
              },
              pulseGlow: {
                "0%, 100%": { boxShadow: "0 0 20px rgba(59, 130, 246, 0.5)" },
                "50%": { boxShadow: "0 0 40px rgba(59, 130, 246, 0.8)" },
              },
              rotateIn: {
                "0%": { opacity: "0", transform: "perspective(1000px) rotateY(-15deg) scale(0.9)" },
                "100%": { opacity: "1", transform: "perspective(1000px) rotateY(0deg) scale(1)" },
              },
              swirlIn: {
                "0%": { opacity: "0", transform: "perspective(1000px) rotateX(-20deg) rotateZ(-10deg) scale(0.8)" },
                "100%": { opacity: "1", transform: "perspective(1000px) rotateX(0deg) rotateZ(0deg) scale(1)" },
              },
              flipIn: {
                "0%": { opacity: "0", transform: "perspective(1000px) rotateX(90deg)" },
                "100%": { opacity: "1", transform: "perspective(1000px) rotateX(0deg)" },
              },
              shimmer: {
                "0%": { backgroundPosition: "-1000px 0" },
                "100%": { backgroundPosition: "1000px 0" },
              },
            },
          },
        },
        darkMode: "selector",
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Orbitron:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="canonical" href="" id="canonical-link" />
    <style>
      * {
        transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
      }

      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
      }

      body {
        overflow-x: hidden;
        position: relative;
      }

      /* Custom Crosshair Cursor */
      body, body * {
        cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32"><circle cx="16" cy="16" r="2" fill="rgba(59, 130, 246, 0.8)"/><line x1="16" y1="4" x2="16" y2="12" stroke="rgba(59, 130, 246, 0.8)" stroke-width="2"/><line x1="16" y1="20" x2="16" y2="28" stroke="rgba(59, 130, 246, 0.8)" stroke-width="2"/><line x1="4" y1="16" x2="12" y2="16" stroke="rgba(59, 130, 246, 0.8)" stroke-width="2"/><line x1="20" y1="16" x2="28" y2="16" stroke="rgba(59, 130, 246, 0.8)" stroke-width="2"/></svg>') 16 16, auto !important;
      }

      button, a, input, textarea, select {
        cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32"><circle cx="16" cy="16" r="8" fill="none" stroke="rgba(239, 68, 68, 0.8)" stroke-width="2"/><circle cx="16" cy="16" r="2" fill="rgba(239, 68, 68, 0.8)"/><line x1="16" y1="0" x2="16" y2="8" stroke="rgba(239, 68, 68, 0.8)" stroke-width="2"/><line x1="16" y1="24" x2="16" y2="32" stroke="rgba(239, 68, 68, 0.8)" stroke-width="2"/><line x1="0" y1="16" x2="8" y2="16" stroke="rgba(239, 68, 68, 0.8)" stroke-width="2"/><line x1="24" y1="16" x2="32" y2="16" stroke="rgba(239, 68, 68, 0.8)" stroke-width="2"/></svg>') 16 16, pointer !important;
      }

      /* Text selection */
      ::selection {
        background-color: rgba(59, 130, 246, 0.3);
        color: inherit;
      }

      ::-moz-selection {
        background-color: rgba(59, 130, 246, 0.3);
        color: inherit;
      }

      /* Loading Screen */
      #loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 30px;
      }

      .loading-title {
        font-family: 'Orbitron', sans-serif;
        font-size: 2.5rem;
        font-weight: 900;
        color: #3b82f6;
        text-shadow: 0 0 20px rgba(59, 130, 246, 0.8);
        letter-spacing: 4px;
      }

      .loading-bar-container {
        width: 400px;
        height: 30px;
        background: rgba(255, 255, 255, 0.1);
        border: 2px solid #3b82f6;
        border-radius: 15px;
        overflow: hidden;
        box-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
      }

      .loading-bar {
        height: 100%;
        background: linear-gradient(90deg, #3b82f6, #8b5cf6, #3b82f6);
        background-size: 200% 100%;
        animation: shimmer 2s linear infinite;
        width: 0%;
        transition: width 0.3s ease;
      }

      .loading-text {
        font-family: 'Orbitron', sans-serif;
        color: #93c5fd;
        font-size: 1rem;
        letter-spacing: 2px;
      }

      @media (max-width: 640px) {
        .loading-title {
          font-size: 1.8rem;
        }
        .loading-bar-container {
          width: 280px;
          height: 24px;
        }
      }

      /* Background canvas */
      #background-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        pointer-events: none;
      }

      #app {
        position: relative;
        z-index: 10;
      }

      .section-enter {
        opacity: 0;
      }

      /* RPG Button Style */
      .rpg-button {
        position: relative;
        overflow: hidden;
        transition: all 0.3s ease;
      }

      .rpg-button::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(59, 130, 246, 0.3), transparent);
        transition: left 0.5s ease;
      }

      .rpg-button:hover::before {
        left: 100%;
      }

      .rpg-button:hover {
        box-shadow: 0 0 20px rgba(59, 130, 246, 0.5), inset 0 0 20px rgba(59, 130, 246, 0.1);
        transform: translateY(-2px);
      }

      /* Target Lock Animation */
      .target-lock {
        position: relative;
      }

      .target-lock::after {
        content: '';
        position: absolute;
        top: -4px;
        left: -4px;
        right: -4px;
        bottom: -4px;
        border: 2px solid #ef4444;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
      }

      .target-lock:hover::after {
        opacity: 1;
      }

      /* Card Interactive with rotation */
      .card-interactive {
        transform: translateY(0);
        transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        position: relative;
        overflow: hidden;
      }

      .card-interactive::before {
        content: '';
        position: absolute;
        top: -2px;
        left: -2px;
        right: -2px;
        bottom: -2px;
        background: linear-gradient(45deg, #3b82f6, #8b5cf6, #ec4899, #3b82f6);
        background-size: 300% 300%;
        z-index: -1;
        opacity: 0;
        transition: opacity 0.4s ease;
        border-radius: inherit;
      }

      .card-interactive:hover::before {
        opacity: 1;
        animation: shimmer 3s linear infinite;
      }

      .card-interactive:hover {
        transform: translateY(-8px) scale(1.02);
        box-shadow: 0 20px 40px rgba(59, 130, 246, 0.3);
      }

      /* Profile Image Animation */
      .profile-image-container {
        animation: float 3s ease-in-out infinite;
      }

      .profile-image-container:hover {
        animation-play-state: paused;
        transform: scale(1.05);
      }

      /* Scroll Reveal Animations */
      .scroll-reveal {
        opacity: 0;
        transform: translateY(50px);
        transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      .scroll-reveal.revealed {
        opacity: 1;
        transform: translateY(0);
      }

      .scroll-reveal-left {
        opacity: 0;
        transform: translateX(-60px) rotate(-5deg);
        transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      .scroll-reveal-left.revealed {
        opacity: 1;
        transform: translateX(0) rotate(0deg);
      }

      .scroll-reveal-right {
        opacity: 0;
        transform: translateX(60px) rotate(5deg);
        transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      .scroll-reveal-right.revealed {
        opacity: 1;
        transform: translateX(0) rotate(0deg);
      }

      .scroll-reveal-scale {
        opacity: 0;
        transform: scale(0.8);
        transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      .scroll-reveal-scale.revealed {
        opacity: 1;
        transform: scale(1);
      }

      .scroll-reveal-rotate {
        opacity: 0;
        transform: perspective(1000px) rotateY(-15deg) scale(0.9);
        transition: all 0.9s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      .scroll-reveal-rotate.revealed {
        opacity: 1;
        transform: perspective(1000px) rotateY(0deg) scale(1);
      }

      .scroll-reveal-swirl {
        opacity: 0;
        transform: perspective(1000px) rotateX(-20deg) rotateZ(-10deg) scale(0.8);
        transition: all 1s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      .scroll-reveal-swirl.revealed {
        opacity: 1;
        transform: perspective(1000px) rotateX(0deg) rotateZ(0deg) scale(1);
      }

      .scroll-reveal-flip {
        opacity: 0;
        transform: perspective(1000px) rotateX(90deg);
        transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      .scroll-reveal-flip.revealed {
        opacity: 1;
        transform: perspective(1000px) rotateX(0deg);
      }

      /* Stagger Animation Delays */
      .stagger-1 { transition-delay: 0.1s; }
      .stagger-2 { transition-delay: 0.2s; }
      .stagger-3 { transition-delay: 0.3s; }
      .stagger-4 { transition-delay: 0.4s; }
      .stagger-5 { transition-delay: 0.5s; }

      /* Responsive adjustments */
      @media (max-width: 768px) {
        .nav-desktop {
          display: none !important;
        }
      }

      @media (min-width: 769px) {
        .nav-mobile {
          display: none !important;
        }
      }

      @media (max-width: 640px) {
        .profile-image-container {
          width: 160px !important;
          height: 160px !important;
        }

        .profile-image-container img {
          width: 160px !important;
          height: 160px !important;
        }
      }

      /* Glitch Effect for Headers */
      .glitch {
        position: relative;
        display: inline-block;
      }

      .glitch:hover::before,
      .glitch:hover::after {
        content: attr(data-text);
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }

      .glitch:hover::before {
        animation: glitch-1 0.3s infinite;
        clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%);
        transform: translate(-2px, -2px);
        opacity: 0.8;
        color: #3b82f6;
      }

      .glitch:hover::after {
        animation: glitch-2 0.3s infinite;
        clip-path: polygon(0 55%, 100% 55%, 100% 100%, 0 100%);
        transform: translate(2px, 2px);
        opacity: 0.8;
        color: #ec4899;
      }

      @keyframes glitch-1 {
        0%, 100% { transform: translate(0); }
        33% { transform: translate(-2px, -2px); }
        66% { transform: translate(2px, 2px); }
      }

      @keyframes glitch-2 {
        0%, 100% { transform: translate(0); }
        33% { transform: translate(2px, 2px); }
        66% { transform: translate(-2px, -2px); }
      }
    </style>
  </head>
  <body
    class="bg-gray-50 text-gray-800 dark:bg-[#0a0e27] dark:text-gray-300 font-space-grotesk antialiased transition-colors duration-300"
  >
    <!-- Loading Screen -->
    <div id="loading-screen">
      <div class="loading-title">INITIALIZING</div>
      <div class="loading-bar-container">
        <div class="loading-bar" id="loading-bar"></div>
      </div>
      <div class="loading-text" id="loading-text">LOADING ASSETS... 0%</div>
    </div>

    <canvas id="background-canvas"></canvas>
    <div id="app"></div>
    <script>
      // Enhanced Starfield Background System (with particles in both modes)
      class StarfieldSystem {
        constructor() {
          this.canvas = document.getElementById('background-canvas');
          this.ctx = this.canvas.getContext('2d');
          this.stars = [];
          this.shootingStars = [];
          this.particles = [];
          this.mouseX = window.innerWidth / 2;
          this.mouseY = window.innerHeight / 2;
          this.isDarkMode = true;
          this.time = 0;
          
          this.resize();
          this.initStars();
          this.setupEventListeners();
          this.animate();
        }

        resize() {
          this.canvas.width = window.innerWidth;
          this.canvas.height = window.innerHeight;
        }

        initStars() {
          const starCount = Math.min(500, Math.floor(window.innerWidth / 4));
          this.stars = [];
          
          for (let i = 0; i < starCount; i++) {
            const layer = Math.random();
            this.stars.push({
              x: Math.random() * this.canvas.width,
              y: Math.random() * this.canvas.height,
              radius: Math.random() * 2.5,
              opacity: Math.random() * 0.8 + 0.2,
              twinkleSpeed: Math.random() * 0.03 + 0.01,
              twinklePhase: Math.random() * Math.PI * 2,
              brightness: Math.random() * 0.7 + 0.3,
              layer: layer,
              color: this.getStarColor(Math.random()),
              pulseSpeed: Math.random() * 0.02 + 0.01,
            });
          }
        }

        getStarColor(random) {
          if (random < 0.7) return { r: 255, g: 255, b: 255 };
          if (random < 0.85) return { r: 147, g: 197, b: 253 };
          if (random < 0.95) return { r: 251, g: 207, b: 232 };
          return { r: 254, g: 240, b: 138 };
        }

        createShootingStar() {
          if (Math.random() > 0.98 && this.shootingStars.length < 3) {
            const startX = Math.random() * this.canvas.width;
            const startY = Math.random() * (this.canvas.height / 2);
            const angle = Math.PI / 4 + Math.random() * Math.PI / 6;
            
            this.shootingStars.push({
              x: startX,
              y: startY,
              vx: Math.cos(angle) * 8,
              vy: Math.sin(angle) * 8,
              length: Math.random() * 60 + 40,
              opacity: 1,
              decay: 0.98,
            });
          }
        }

        setupEventListeners() {
          window.addEventListener('mousemove', (e) => {
            this.mouseX = e.clientX;
            this.mouseY = e.clientY;
            
            if (Math.random() > 0.85) {
              this.createInteractionParticles(e.clientX, e.clientY);
            }
          });

          window.addEventListener('resize', () => {
            this.resize();
            this.initStars();
          });

          const observer = new MutationObserver(() => {
            this.isDarkMode = document.documentElement.classList.contains('dark');
          });
          observer.observe(document.documentElement, { attributes: true, attributeFilter: ['class'] });
        }

        createInteractionParticles(x, y) {
          const particleCount = 3;
          const colors = this.isDarkMode ? 
            [{ r: 147, g: 197, b: 253 }, { r: 168, g: 85, b: 247 }, { r: 236, g: 72, b: 153 }] :
            [{ r: 59, g: 130, b: 246 }, { r: 249, g: 115, b: 22 }, { r: 139, g: 92, b: 246 }];
          
          for (let i = 0; i < particleCount; i++) {
            this.particles.push({
              x: x,
              y: y,
              vx: (Math.random() - 0.5) * 4,
              vy: (Math.random() - 0.5) * 4 - 1,
              radius: Math.random() * 2 + 1,
              opacity: this.isDarkMode ? 0.8 : 0.6,
              decay: 0.96,
              life: 1,
              color: colors[Math.floor(Math.random() * colors.length)],
            });
          }
        }

        updateStars() {
          for (let star of this.stars) {
            star.twinklePhase += star.twinkleSpeed;
            const twinkle = Math.sin(star.twinklePhase);
            star.opacity = (twinkle * 0.5 + 0.5) * star.brightness;
            
            const parallaxX = (this.mouseX - this.canvas.width / 2) * star.layer * 0.01;
            const parallaxY = (this.mouseY - this.canvas.height / 2) * star.layer * 0.01;
            star.parallaxX = parallaxX;
            star.parallaxY = parallaxY;
          }
        }

        updateShootingStars() {
          this.shootingStars = this.shootingStars.filter(star => star.opacity > 0.01);
          
          for (let star of this.shootingStars) {
            star.x += star.vx;
            star.y += star.vy;
            star.opacity *= star.decay;
          }
        }

        updateParticles() {
          this.particles = this.particles.filter(p => p.life > 0.01);
          
          for (let particle of this.particles) {
            particle.x += particle.vx;
            particle.y += particle.vy;
            particle.vy += 0.15;
            particle.opacity *= particle.decay;
            particle.life *= particle.decay;
          }
        }

        drawBackground() {
          if (this.isDarkMode) {
            const gradient = this.ctx.createLinearGradient(0, 0, 0, this.canvas.height);
            gradient.addColorStop(0, '#000510');
            gradient.addColorStop(0.5, '#0a0e27');
            gradient.addColorStop(1, '#020617');
            this.ctx.fillStyle = gradient;
          } else {
            const gradient = this.ctx.createLinearGradient(0, 0, 0, this.canvas.height);
            gradient.addColorStop(0, '#f8fafc');
            gradient.addColorStop(0.5, '#f1f5f9');
            gradient.addColorStop(1, '#e2e8f0');
            this.ctx.fillStyle = gradient;
          }
          this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
        }

        drawStars() {
          if (!this.isDarkMode) return;
          
          for (let star of this.stars) {
            const x = star.x + (star.parallaxX || 0);
            const y = star.y + (star.parallaxY || 0);
            
            this.ctx.fillStyle = `rgba(${star.color.r}, ${star.color.g}, ${star.color.b}, ${star.opacity})`;
            this.ctx.beginPath();
            this.ctx.arc(x, y, star.radius, 0, Math.PI * 2);
            this.ctx.fill();

            if (star.opacity > 0.5 && star.radius > 1) {
              const glowGradient = this.ctx.createRadialGradient(x, y, 0, x, y, star.radius * 4);
              glowGradient.addColorStop(0, `rgba(${star.color.r}, ${star.color.g}, ${star.color.b}, ${star.opacity * 0.4})`);
              glowGradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
              this.ctx.fillStyle = glowGradient;
              this.ctx.beginPath();
              this.ctx.arc(x, y, star.radius * 4, 0, Math.PI * 2);
              this.ctx.fill();
            }

            if (star.opacity > 0.7 && star.radius > 1.5) {
              this.ctx.strokeStyle = `rgba(${star.color.r}, ${star.color.g}, ${star.color.b}, ${star.opacity * 0.6})`;
              this.ctx.lineWidth = 0.5;
              const sparkleSize = star.radius * 3;
              
              this.ctx.beginPath();
              this.ctx.moveTo(x - sparkleSize, y);
              this.ctx.lineTo(x + sparkleSize, y);
              this.ctx.stroke();
              
              this.ctx.beginPath();
              this.ctx.moveTo(x, y - sparkleSize);
              this.ctx.lineTo(x, y + sparkleSize);
              this.ctx.stroke();
            }
          }
        }

        drawShootingStars() {
          if (!this.isDarkMode) return;
          
          for (let star of this.shootingStars) {
            const gradient = this.ctx.createLinearGradient(
              star.x, star.y,
              star.x - star.vx * 5, star.y - star.vy * 5
            );
            gradient.addColorStop(0, `rgba(255, 255, 255, ${star.opacity})`);
            gradient.addColorStop(0.5, `rgba(147, 197, 253, ${star.opacity * 0.6})`);
            gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
            
            this.ctx.strokeStyle = gradient;
            this.ctx.lineWidth = 2;
            this.ctx.beginPath();
            this.ctx.moveTo(star.x, star.y);
            this.ctx.lineTo(star.x - star.vx * 5, star.y - star.vy * 5);
            this.ctx.stroke();
            
            this.ctx.strokeStyle = `rgba(147, 197, 253, ${star.opacity * 0.3})`;
            this.ctx.lineWidth = 4;
            this.ctx.beginPath();
            this.ctx.moveTo(star.x, star.y);
            this.ctx.lineTo(star.x - star.vx * 3, star.y - star.vy * 3);
            this.ctx.stroke();
          }
        }

        drawParticles() {
          for (let particle of this.particles) {
            this.ctx.fillStyle = `rgba(${particle.color.r}, ${particle.color.g}, ${particle.color.b}, ${particle.opacity})`;
            this.ctx.beginPath();
            this.ctx.arc(particle.x, particle.y, particle.radius, 0, Math.PI * 2);
            this.ctx.fill();

            const glowGradient = this.ctx.createRadialGradient(
              particle.x, particle.y, 0,
              particle.x, particle.y, particle.radius * 3
            );
            glowGradient.addColorStop(0, `rgba(${particle.color.r}, ${particle.color.g}, ${particle.color.b}, ${particle.opacity * 0.5})`);
            glowGradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
            this.ctx.fillStyle = glowGradient;
            this.ctx.beginPath();
            this.ctx.arc(particle.x, particle.y, particle.radius * 3, 0, Math.PI * 2);
            this.ctx.fill();
          }
        }

        animate() {
          this.time++;
          this.drawBackground();
          
          if (this.isDarkMode) {
            this.updateStars();
            this.drawStars();
            
            if (this.time % 3 === 0) {
              this.createShootingStar();
            }
            this.updateShootingStars();
            this.drawShootingStars();
          }

          this.updateParticles();
          this.drawParticles();

          requestAnimationFrame(() => this.animate());
        }
      }

      class LoadingManager {
        constructor() {
          this.loadingScreen = document.getElementById('loading-screen');
          this.loadingBar = document.getElementById('loading-bar');
          this.loadingText = document.getElementById('loading-text');
          this.progress = 0;
          this.messages = [
            'INITIALIZING SYSTEMS',
            'LOADING NEURAL NETWORK',
            'CALIBRATING VISUAL SYSTEMS',
            'ESTABLISHING CONNECTION',
            'READY FOR DEPLOYMENT'
          ];
          this.currentMessage = 0;
        }

        updateProgress(progress) {
          this.progress = Math.min(progress, 100);
          this.loadingBar.style.width = this.progress + '%';
          
          const messageIndex = Math.floor(this.progress / 25);
          if (messageIndex !== this.currentMessage && messageIndex < this.messages.length) {
            this.currentMessage = messageIndex;
            this.loadingText.textContent = this.messages[messageIndex] + '... ' + Math.floor(this.progress) + '%';
          } else {
            this.loadingText.textContent = this.messages[this.currentMessage] + '... ' + Math.floor(this.progress) + '%';
          }
        }

        complete() {
          this.updateProgress(100);
          setTimeout(() => {
            this.loadingScreen.style.opacity = '0';
            this.loadingScreen.style.transition = 'opacity 0.5s ease';
            setTimeout(() => {
              this.loadingScreen.style.display = 'none';
            }, 500);
          }, 500);
        }
      }

      // Scroll Animation Manager
      class ScrollAnimationManager {
        constructor() {
          this.observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -100px 0px'
          };
          this.observer = new IntersectionObserver(
            this.handleIntersection.bind(this),
            this.observerOptions
          );
          this.init();
        }

        init() {
          setTimeout(() => {
            const elements = document.querySelectorAll('.scroll-reveal, .scroll-reveal-left, .scroll-reveal-right, .scroll-reveal-scale, .scroll-reveal-rotate, .scroll-reveal-swirl, .scroll-reveal-flip');
            elements.forEach(el => this.observer.observe(el));
          }, 100);
        }

        handleIntersection(entries) {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              entry.target.classList.add('revealed');
              this.observer.unobserve(entry.target);
            }
          });
        }

        refresh() {
          this.init();
        }
      }

      function setTheme(theme) {
        try {
          localStorage.setItem("theme", theme);
          if (theme === "dark") {
            document.documentElement.classList.add("dark");
          } else {
            document.documentElement.classList.remove("dark");
          }
          const toggle = document.getElementById("theme-toggle");
          const toggleMobile = document.getElementById("theme-toggle-mobile");
          if (toggle) {
            toggle.innerHTML = getIconSVG(theme === "dark" ? "sun" : "moon");
          }
          if (toggleMobile) {
            toggleMobile.innerHTML = getIconSVG(theme === "dark" ? "sun" : "moon");
          }
        } catch (e) {
          console.warn('Theme setting failed:', e);
        }
      }

      function setupTheme() {
        try {
          const savedTheme = localStorage.getItem("theme");
          const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          const defaultTheme = savedTheme || (prefersDark ? "dark" : "light");
          setTheme(defaultTheme);

          const toggle = document.getElementById("theme-toggle");
          if (toggle) {
            toggle.addEventListener("click", () => {
              const currentTheme = localStorage.getItem("theme") || "light";
              setTheme(currentTheme === "dark" ? "light" : "dark");
            });
          }

          const toggleMobile = document.getElementById("theme-toggle-mobile");
          if (toggleMobile) {
            toggleMobile.addEventListener("click", () => {
              const currentTheme = localStorage.getItem("theme") || "light";
              setTheme(currentTheme === "dark" ? "light" : "dark");
            });
          }
        } catch (e) {
          console.warn('Theme setup failed:', e);
        }

      function setMetaTags(data) {
        try {
          const pageTitle = `${data.settings.name} - ${data.settings.title}`;
          const pageDescription = data.settings.summary;
          const pageImage = data.settings.profileImage;
          const pageUrl = window.location.href;

          document.title = pageTitle;

          const createOrUpdateMeta = (property, content, isNameAttribute = false) => {
            const attribute = isNameAttribute ? "name" : "property";
            let element = document.querySelector(`meta[${attribute}="${property}"]`);
            if (!element) {
              element = document.createElement("meta");
              element.setAttribute(attribute, property);
              document.head.appendChild(element);
            }
            element.setAttribute("content", content);
          };

          createOrUpdateMeta("description", pageDescription, true);
          createOrUpdateMeta("og:title", pageTitle);
          createOrUpdateMeta("og:description", pageDescription);
          createOrUpdateMeta("og:image", pageImage);
          createOrUpdateMeta("og:url", pageUrl);
          createOrUpdateMeta("og:type", "website");
          createOrUpdateMeta("twitter:card", "summary_large_image", true);
          createOrUpdateMeta("twitter:title", pageTitle, true);
          createOrUpdateMeta("twitter:description", pageDescription, true);
          createOrUpdateMeta("twitter:image", pageImage, true);

          const canonical = document.getElementById("canonical-link");
          if (canonical) {
            canonical.setAttribute("href", pageUrl.split("#")[0]);
          }
        } catch (e) {
          console.warn('Meta tags setup failed:', e);
        }
      }

                <h3 class="font-semibold text-lg text-gray-900 dark:text-white group-hover:text-purple-600 dark:group-hover:text-purple-400 transition-colors duration-300">${item.degree}</h3>
                <div class="text-sm text-gray-600 dark:text-gray-500 font-mono px-3 py-1 bg-gray-100 dark:bg-gray-800 rounded-full">${item.period}</div>
            </div>
            <p class="text-gray-700 dark:text-gray-400 text-base mb-2 font-medium">${item.institution}</p>
            ${item.details ? `<p class="text-gray-600 dark:text-gray-500 text-sm">${item.details}</p>` : ''}
        </div>`)
              .join("");

            educationHTML = `
        <div class="mt-20" id="education">
            ${createSectionDivider(data.sections.education.title)}
            ${educationItemsHTML}
        </div>
      `;
          }

          loadingManager.updateProgress(90);

          let achievementsHTML = "";
          if (data.sections.achievements && data.sections.achievements.enabled) {
            const achievementItemsHTML = data.sections.achievements.items
              .map((item, idx) => `
        <div class="rounded-lg border-2 border-gray-300 dark:border-gray-700 p-6 card-interactive group hover:border-blue-500 dark:hover:border-blue-600 bg-white dark:bg-gray-800/50 scroll-reveal-flip stagger-${(idx % 5) + 1}">
          <h3 class="font-semibold text-base text-gray-900 dark:text-white group-hover:text-blue-600 dark:group-hover:text-blue-400 transition-colors duration-300 mb-2">${item.title}</h3>
          <p class="text-gray-700 dark:text-gray-400 text-sm">${item.description}</p>
        </div>`)
              .join("");

            achievementsHTML = `
        <div class="mt-20" id="achievements">
          ${createSectionDivider(data.sections.achievements.title)}
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            ${achievementItemsHTML}
          </div>
        </div>
      `;
          }

          let contactHTML = "";
          if (data.sections.contact && data.sections.contact.enabled) {
            const contactItems = [
              {
                value: data.sections.contact.email,
                link: `mailto:${data.sections.contact.email}`,
                label: "Email"
              },
              {
                value: data.sections.contact.phone,
                link: `tel:${data.sections.contact.phone}`,
                label: "Phone"
              },
              {
                value: data.sections.contact.location,
                link: `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(data.sections.contact.location)}`,
                label: "Location"
              },
            ]
              .filter((item) => item.value)
              .map((item, idx) =>
                `<div class="text-center group target-lock scroll-reveal-scale stagger-${idx + 1}">
                  <p class="text-gray-600 dark:text-gray-500 text-xs uppercase tracking-widest mb-2 group-hover:text-blue-600 dark:group-hover:text-blue-400 transition-colors duration-300 font-orbitron">${item.label}</p>
                  <a href="${item.link}" target="_blank" rel="noopener noreferrer" class="text-gray-800 dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400 transition-all duration-300 hover:scale-105 inline-block font-medium text-sm">${item.value}</a>
                </div>`)
              .join("");

            const contactFormHTML = data.sections.contact.showContactForm ? `
              <div class="mt-16 max-w-2xl mx-auto scroll-reveal">
                <h3 class="font-semibold text-xl text-gray-900 dark:text-white mb-8 text-center glitch" data-text="Send Me a Message">Send Me a Message</h3>
                <form class="space-y-5" onsubmit="handleContactForm(event)">
                  <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                    <input type="text" placeholder="Your Name" required class="px-4 py-3 border-2 border-gray-300 dark:border-gray-700 rounded-lg bg-white dark:bg-gray-800 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 dark:focus:ring-blue-600 focus:border-transparent transition-all duration-300 hover:border-blue-400 dark:hover:border-blue-600 rpg-button">
                    <input type="email" placeholder="Your Email" required class="px-4 py-3 border-2 border-gray-300 dark:border-gray-700 rounded-lg bg-white dark:bg-gray-800 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 dark:focus:ring-blue-600 focus:border-transparent transition-all duration-300 hover:border-blue-400 dark:hover:border-blue-600 rpg-button">
                  </div>
                  <input type="text" placeholder="Subject" required class="w-full px-4 py-3 border-2 border-gray-300 dark:border-gray-700 rounded-lg bg-white dark:bg-gray-800 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 dark:focus:ring-blue-600 focus:border-transparent transition-all duration-300 hover:border-blue-400 dark:hover:border-blue-600 rpg-button">
                  <textarea rows="6" placeholder="Your Message" required class="w-full px-4 py-3 border-2 border-gray-300 dark:border-gray-700 rounded-lg bg-white dark:bg-gray-800 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 dark:focus:ring-blue-600 focus:border-transparent transition-all duration-300 hover:border-blue-400 dark:hover:border-blue-600 resize-none rpg-button"></textarea>
                  <button type="submit" class="w-full px-6 py-4 bg-gradient-to-r from-blue-500 to-purple-600 dark:from-blue-600 dark:to-purple-700 text-white rounded-lg hover:shadow-2xl hover:scale-105 transition-all duration-300 font-semibold rpg-button target-lock">
                    Send Message
                  </button>
                </form>
              </div>
            ` : '';

            contactHTML = `
        <div class="mt-20" id="contact">
           ${createSectionDivider(data.sections.contact.title)}
           ${data.sections.contact.subtitle ? `<p class="text-gray-700 dark:text-gray-400 text-center mb-12 max-w-2xl mx-auto scroll-reveal">${data.sections.contact.subtitle}</p>` : ''}
            <div class="flex flex-col items-center gap-8 text-sm mb-8">
                <div class="flex flex-col sm:flex-row flex-wrap justify-center gap-x-12 gap-y-6 w-full">
                  ${contactItems}
                </div>
                <div class="flex items-center gap-4 flex-wrap justify-center scroll-reveal">
                  ${socialLinksHTML}
                </div>
            </div>
            ${contactFormHTML}
        </div>
      `;
          }

          let footerHTML = "";
          if (data.footer && data.footer.enabled) {
            footerHTML = `
        <footer class="py-8 text-center text-sm text-gray-600 dark:text-gray-600 border-t-2 border-gray-200 dark:border-gray-700 mt-20">
            <p class="animate-fade-in font-orbitron">${data.footer.copyright}</p>
        </footer>
      `;
          }

          const content = `
    ${headerHTML}
    <div class="flex flex-col min-h-screen relative nav-mobile:pt-20">
      <div class="nav-desktop fixed top-4 right-4 z-50 animate-fade-in">
          <button id="theme-toggle" class="p-3 rounded-full bg-gray-200 dark:bg-gray-800 text-gray-900 dark:text-white hover:bg-gray-300 dark:hover:bg-gray-700 transition-all duration-300 hover:scale-110 rpg-button target-lock shadow-lg"></button>
      </div>
      <main class="flex-grow max-w-4xl mx-auto px-4 sm:px-6 pt-32 sm:pt-40 pb-12 animate-blur-in nav-mobile:pt-8">
        <header class="grid grid-cols-1 sm:grid-cols-3 gap-8 sm:gap-12 items-center mb-16 sm:mb-20">
            <div class="sm:col-span-1 flex justify-center scroll-reveal-scale">
              <div class="relative group">
                <div class="absolute inset-0 bg-gradient-to-r from-blue-500 to-purple-600 rounded-full blur-2xl opacity-60 group-hover:opacity-90 transition-opacity duration-500 animate-pulse-glow"></div>
                <img src="${data.settings.profileImage}" alt="${data.settings.name}" class="profile-image-container relative rounded-full w-40 h-40 sm:w-48 sm:h-48 object-cover border-4 border-white dark:border-gray-800 shadow-2xl" loading="lazy">
              </div>
            </div>
            <div class="sm:col-span-2 scroll-reveal text-center sm:text-left">
                <h1 class="text-3xl sm:text-5xl font-bold text-gray-900 dark:text-white mb-2 glitch" data-text="Hey, I'm ${data.settings.name}">Hey, I'm ${data.settings.name}</h1>
                <p class="text-base sm:text-xl text-gray-700 dark:text-gray-300 mb-6 font-medium">${data.settings.title} • ${data.settings.location}</p>
                 <div class="flex flex-wrap gap-4 mt-8 justify-center sm:justify-start">
                  ${ctaButtonsHTML}
                </div>
            </div>
        </header>

        ${aboutHTML}
        ${skillsHTML}
        ${projectsHTML}
        ${experienceHTML}
        ${educationHTML}
        ${achievementsHTML}
        ${contactHTML}

      </main>
      ${footerHTML}
    </div>
    `;

          document.getElementById("app").innerHTML = content;
          
          loadingManager.updateProgress(95);
          
          setupTheme();
          
          scrollAnimationManager = new ScrollAnimationManager();

          try {
            const personSchema = {
              "@context": "https://schema.org",
              "@type": "Person",
              name: data.settings.name,
              jobTitle: data.settings.title,
              description: data.settings.summary,
              image: data.settings.profileImage,
              url: window.location.href,
              sameAs: (data.sections.social?.items || []).map((s) => ensureUrl(s.url)),
              address: {
                "@type": "PostalAddress",
                addressLocality: data.settings.location,
              },
            };
            const ld = document.createElement("script");
            ld.type = "application/ld+json";
            ld.textContent = JSON.stringify(personSchema);
            document.head.appendChild(ld);
          } catch (e) {
            console.warn("JSON-LD injection failed", e);
          }

          document.querySelectorAll('a[href^="#"]').forEach((anchor) => {
            anchor.addEventListener("click", function (e) {
              e.preventDefault();
              const targetId = this.getAttribute("href");
              if (targetId === "#") {
                window.scrollTo({ top: 0, behavior: "smooth" });
                return;
              }
              const targetElement = document.querySelector(targetId);
              if (targetElement) {
                targetElement.scrollIntoView({ behavior: "smooth", block: "start" });
              }
            });
          });

          const hamburgerMenu = document.getElementById("hamburger-menu");
          const sidebar = document.getElementById("mobile-sidebar");

          function closeSidebar() {
            if (sidebar) {
              sidebar.classList.add("-translate-x-full");
            }
          }

          if (hamburgerMenu && sidebar) {
            hamburgerMenu.addEventListener("click", () => {
              const isOpen = !sidebar.classList.contains("-translate-x-full");
              if (isOpen) {
                closeSidebar();
              } else {
                sidebar.classList.remove("-translate-x-full");
              }
            });

            sidebar.querySelectorAll("a").forEach((link) => {
              link.addEventListener("click", () => {
                closeSidebar();
              });
            });

            document.addEventListener("click", (event) => {
              if (!sidebar.contains(event.target) && !hamburgerMenu.contains(event.target)) {
                closeSidebar();
              }
            });

            document.addEventListener("keydown", (event) => {
              if (event.key === "Escape") {
                closeSidebar();
              }
            });
          }
          
          loadingManager.complete();
        } catch (err) {
          document.getElementById("app").innerHTML = `<div class="text-red-500 p-8 text-center">Error: ${err.message}</div>`;
          console.error(err);
          loadingManager.complete();
        }
      }

      function handleContactForm(event) {
        try {
          event.preventDefault();
          const form = event.target;
          
          const successMsg = document.createElement('div');
          successMsg.className = 'fixed top-20 left-1/2 -translate-x-1/2 z-50 bg-gradient-to-r from-green-500 to-emerald-600 text-white px-6 py-3 rounded-lg shadow-2xl animate-slide-up font-orbitron';
          successMsg.textContent = '✓ MESSAGE SENT SUCCESSFULLY';
          document.body.appendChild(successMsg);
          
          setTimeout(() => {
            successMsg.style.animation = 'fadeOut 0.5s ease-out forwards';
            setTimeout(() => successMsg.remove(), 500);
          }, 4000);
          
          form.reset();
        } catch (e) {
          console.warn('Form submission handling failed:', e);
        }
      }

      document.addEventListener("DOMContentLoaded", () => {
        try {
          loadingManager = new LoadingManager();
          loadingManager.updateProgress(10);
          
          starfield = new StarfieldSystem();
          loadingManager.updateProgress(20);
          
          renderPortfolio();
        } catch (e) {
          console.error('Initialization failed:', e);
          document.getElementById('loading-screen').style.display = 'none';
          document.getElementById("app").innerHTML = `<div class="text-red-500 p-8 text-center">Failed to initialize portfolio. Please refresh the page.</div>`;
        }
      });
    </script>
  </body>
</html>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              "space-grotesk": ["Space Grotesk", "sans-serif"],
            },
            animation: {
              "blur-in": "blurIn 0.7s ease-out forwards",
              "fade-in": "fadeIn 0.5s ease-out forwards",
              "slide-up": "slideUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1)",
              "slide-in-left": "slideInLeft 0.6s cubic-bezier(0.34, 1.56, 0.64, 1)",
              "slide-in-right": "slideInRight 0.6s cubic-bezier(0.34, 1.56, 0.64, 1)",
              "scale-in": "scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)",
              "fade-in-scale": "fadeInScale 0.6s cubic-bezier(0.34, 1.56, 0.64, 1)",
              "float": "float 3s ease-in-out infinite",
              "pulse-glow": "pulseGlow 2s ease-in-out infinite",
              "scan": "scan 2s linear infinite",
              "target-lock": "targetLock 0.3s ease-out",
              "loading-bar": "loadingBar 2s ease-in-out infinite",
            },
            keyframes: {
              blurIn: {
                "0%": { filter: "blur(5px)", opacity: "0" },
                "100%": { filter: "blur(0)", opacity: "1" },
              },
              fadeIn: {
                "0%": { opacity: "0", transform: "translateY(20px)" },
                "100%": { opacity: "1", transform: "translateY(0)" },
              },
              slideUp: {
                "0%": { opacity: "0", transform: "translateY(40px)" },
                "100%": { opacity: "1", transform: "translateY(0)" },
              },
              slideInLeft: {
                "0%": { opacity: "0", transform: "translateX(-60px)" },
                "100%": { opacity: "1", transform: "translateX(0)" },
              },
              slideInRight: {
                "0%": { opacity: "0", transform: "translateX(60px)" },
                "100%": { opacity: "1", transform: "translateX(0)" },
              },
              scaleIn: {
                "0%": { opacity: "0", transform: "scale(0.95)" },
                "100%": { opacity: "1", transform: "scale(1)" },
              },
              fadeInScale: {
                "0%": { opacity: "0", transform: "scale(0.9) translateY(20px)" },
                "100%": { opacity: "1", transform: "scale(1) translateY(0)" },
              },
              float: {
                "0%, 100%": { transform: "translateY(0px)" },
                "50%": { transform: "translateY(-10px)" },
              },
              pulseGlow: {
                "0%, 100%": { boxShadow: "0 0 20px rgba(59, 130, 246, 0.3)" },
                "50%": { boxShadow: "0 0 40px rgba(59, 130, 246, 0.6)" },
              },
              scan: {
                "0%": { transform: "translateY(-100%)" },
                "100%": { transform: "translateY(100%)" },
              },
              targetLock: {
                "0%": { transform: "scale(1.5)", opacity: "0" },
                "100%": { transform: "scale(1)", opacity: "1" },
              },
              loadingBar: {
                "0%, 100%": { transform: "translateX(-100%)" },
                "50%": { transform: "translateX(100%)" },
              },
            },
          },
        },
        darkMode: "selector",
      };
    </script>

    <style>
      * {
        transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
      }

      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        user-select: none;
      }

      body {
        overflow-x: hidden;
        position: relative;
      }

      /* Custom Crosshair Cursor */
      .crosshair-cursor {
        cursor: crosshair !important;
      }

      .crosshair-cursor * {
        cursor: crosshair !important;
      }

      /* Target reticle for interactive elements */
      .target-element {
        position: relative;
      }

      .target-element::before,
      .target-element::after {
        content: '';
        position: absolute;
        opacity: 0;
        transition: opacity 0.3s ease;
        pointer-events: none;
      }

      .target-element:hover::before {
        opacity: 1;
        border: 2px solid rgba(239, 68, 68, 0.6);
        border-radius: 4px;
        top: -4px;
        left: -4px;
        right: -4px;
        bottom: -4px;
        animation: target-lock 0.3s ease-out;
      }

      /* Scan line effect */
      .scan-line {
        position: absolute;
        width: 100%;
        height: 2px;
        background: linear-gradient(90deg, 
          transparent, 
          rgba(59, 130, 246, 0.6), 
          transparent);
        pointer-events: none;
        animation: scan 2s linear infinite;
      }

      /* HUD corners */
      .hud-corners {
        position: relative;
      }

      .hud-corners::before,
      .hud-corners::after {
        content: '';
        position: absolute;
        width: 20px;
        height: 20px;
        border: 2px solid currentColor;
        opacity: 0;
        transition: opacity 0.3s ease;
      }

      .hud-corners::before {
        top: -2px;
        left: -2px;
        border-right: none;
        border-bottom: none;
      }

      .hud-corners::after {
        bottom: -2px;
        right: -2px;
        border-left: none;
        border-top: none;
      }

      .hud-corners:hover::before,
      .hud-corners:hover::after {
        opacity: 0.5;
      }

      /* Disable text selection highlight */
      ::selection {
        background-color: rgba(59, 130, 246, 0.3);
        color: inherit;
      }

      ::-moz-selection {
        background-color: rgba(59, 130, 246, 0.3);
        color: inherit;
      }

      /* Background canvas */
      #background-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        pointer-events: none;
      }

      #app {
        position: relative;
        z-index: 10;
      }

      .section-enter {
        animation: slideUp 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        opacity: 0;
      }

      /* Enhanced button interactions */
      .btn-interactive {
        position: relative;
        overflow: hidden;
        transition: all 0.3s ease;
      }

      .btn-interactive::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        width: 0;
        height: 0;
        border-radius: 50%;
        background: rgba(59, 130, 246, 0.2);
        transform: translate(-50%, -50%);
        transition: width 0.6s ease, height 0.6s ease;
      }

      .btn-interactive:hover::before {
        width: 300px;
        height: 300px;
      }

      .btn-interactive:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      }

      /* Enhanced card interactions */
      .card-interactive {
        transform: translateY(0);
        transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        position: relative;
        overflow: hidden;
      }

      .card-interactive::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, 
          transparent, 
          rgba(255, 255, 255, 0.1), 
          transparent);
        transition: left 0.5s ease;
      }

      .card-interactive:hover::before {
        left: 100%;
      }

      .card-interactive:hover {
        transform: translateY(-8px) scale(1.02);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
      }

      .dark .card-interactive:hover {
        box-shadow: 0 20px 40px rgba(59, 130, 246, 0.2);
      }

      .img-interactive {
        transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      .img-interactive:hover {
        transform: scale(1.05);
      }

      .link-underline {
        position: relative;
        text-decoration: none;
      }

      .link-underline::after {
        content: '';
        position: absolute;
        bottom: -2px;
        left: 0;
        width: 0;
        height: 2px;
        background-color: currentColor;
        transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      .link-underline:hover::after {
        width: 100%;
      }

      html {
        scroll-behavior: smooth;
      }

      /* Scroll reveal animations */
      .scroll-reveal {
        opacity: 0;
        transform: translateY(40px);
        transition: opacity 0.6s ease-out, transform 0.6s ease-out;
      }

      .scroll-reveal.revealed {
        opacity: 1;
        transform: translateY(0);
      }

      .scroll-reveal-left {
        opacity: 0;
        transform: translateX(-60px);
        transition: opacity 0.6s ease-out, transform 0.6s ease-out;
      }

      .scroll-reveal-left.revealed {
        opacity: 1;
        transform: translateX(0);
      }

      .scroll-reveal-right {
        opacity: 0;
        transform: translateX(60px);
        transition: opacity 0.6s ease-out, transform 0.6s ease-out;
      }

      .scroll-reveal-right.revealed {
        opacity: 1;
        transform: translateX(0);
      }

      /* Responsive header */
      @media (max-width: 768px) {
        .nav-desktop {
          display: none !important;
        }
      }

      @media (min-width: 769px) {
        .nav-mobile {
          display: none !important;
        }
      }

      /* Responsive image sizing */
      @media (max-width: 640px) {
        .profile-image-container {
          width: 160px !important;
          height: 160px !important;
        }

        .profile-image-container img {
          width: 160px !important;
          height: 160px !important;
        }
      }

      /* Parallax effect */
      .parallax {
        transition: transform 0.1s ease-out;
      }
    </style>

    <canvas id="background-canvas"></canvas>
    <div id="app"></div>
    <script>
      // Loading screen manager


      // Enhanced Background Animation System with Stars.js-like effect
      class BackgroundAnimationSystem {
        constructor() {
          this.canvas = document.getElementById('background-canvas');
          this.ctx = this.canvas.getContext('2d');
          this.particles = [];
          this.stars = [];
          this.constellations = [];
          this.shootingStars = [];
          this.mouseX = window.innerWidth / 2;
          this.mouseY = window.innerHeight / 2;
          this.isDarkMode = true;
          this.time = 0;
          
          this.resize();
          this.initStars();
          this.initConstellations();
          this.setupEventListeners();
          this.animate();
          
        }

        resize() {
          this.canvas.width = window.innerWidth;
          this.canvas.height = window.innerHeight;
        }

        initStars() {
          const starCount = Math.min(500, Math.floor(window.innerWidth / 4));
          this.stars = [];
          
          // Create layered stars for depth
          for (let i = 0; i < starCount; i++) {
            const depth = Math.random();
            this.stars.push({
              x: Math.random() * this.canvas.width,
              y: Math.random() * this.canvas.height,
              z: depth,
              radius: Math.random() * 1.5 * (1 + depth),
              opacity: Math.random() * 0.8 + 0.2,
              twinkleSpeed: Math.random() * 0.03 + 0.01,
              twinklePhase: Math.random() * Math.PI * 2,
              brightness: Math.random() * 0.6 + 0.4,
              color: this.getStarColor(),
              vx: (Math.random() - 0.5) * 0.1 * depth,
              vy: (Math.random() - 0.5) * 0.1 * depth,
            });
          }
        }

        getStarColor() {
          const colors = [
            { r: 255, g: 255, b: 255 }, // White
            { r: 147, g: 197, b: 253 }, // Blue
            { r: 251, g: 207, b: 232 }, // Pink
            { r: 253, g: 230, b: 138 }, // Yellow
          ];
          return colors[Math.floor(Math.random() * colors.length)];
        }

        initConstellations() {
          // Create subtle constellation connections
          const constellationCount = 8;
          for (let i = 0; i < constellationCount; i++) {
            const starCount = Math.floor(Math.random() * 3) + 3;
            const constellation = [];
            for (let j = 0; j < starCount; j++) {
              constellation.push(this.stars[Math.floor(Math.random() * this.stars.length)]);
            }
            this.constellations.push(constellation);
          }
        }

        createShootingStar() {
          if (Math.random() > 0.98 && this.shootingStars.length < 3) {
            this.shootingStars.push({
              x: Math.random() * this.canvas.width,
              y: Math.random() * this.canvas.height * 0.5,
              vx: (Math.random() * 5 + 3) * (Math.random() > 0.5 ? 1 : -1),
              vy: Math.random() * 3 + 2,
              length: Math.random() * 80 + 40,
              opacity: 1,
              decay: 0.98,
            });
          }
        }

        setupEventListeners() {
          window.addEventListener('mousemove', (e) => {
            this.mouseX = e.clientX;
            this.mouseY = e.clientY;
            
            // Create subtle particles on mouse move in dark mode
            if (this.isDarkMode && Math.random() > 0.85) {
              this.createParticle(e.clientX, e.clientY);
            }
          });

          window.addEventListener('resize', () => this.resize());

          const observer = new MutationObserver(() => {
            this.isDarkMode = document.documentElement.classList.contains('dark');
            if (this.isDarkMode) {
              this.initStars();
              this.initConstellations();
            }
          });
          observer.observe(document.documentElement, { attributes: true, attributeFilter: ['class'] });
        }

        createParticle(x, y) {
          const particle = {
            x: x,
            y: y,
            vx: (Math.random() - 0.5) * 2,
            vy: (Math.random() - 0.5) * 2 - 0.5,
            radius: Math.random() * 1 + 0.3,
            opacity: 0.6,
            decay: 0.97,
            life: 1,
            color: { r: 147, g: 197, b: 253 },
          };
          this.particles.push(particle);
        }

        updateParticles() {
          this.particles = this.particles.filter(p => p.life > 0.01);
          
          for (let particle of this.particles) {
            particle.x += particle.vx;
            particle.y += particle.vy;
            particle.vy += 0.05;
            particle.opacity *= particle.decay;
            particle.life *= particle.decay;
          }
        }

        updateStars() {
          for (let star of this.stars) {
            star.twinklePhase += star.twinkleSpeed;
            const twinkle = Math.sin(star.twinklePhase);
            star.opacity = (twinkle * 0.4 + 0.6) * star.brightness;
            
            // Subtle parallax movement
            const dx = (this.mouseX - this.canvas.width / 2) * 0.0001 * star.z;
            const dy = (this.mouseY - this.canvas.height / 2) * 0.0001 * star.z;
            star.x += star.vx + dx;
            star.y += star.vy + dy;
            
            // Wrap around
            if (star.x < 0) star.x = this.canvas.width;
            if (star.x > this.canvas.width) star.x = 0;
            if (star.y < 0) star.y = this.canvas.height;
            if (star.y > this.canvas.height) star.y = 0;
          }
        }

        updateShootingStars() {
          this.shootingStars = this.shootingStars.filter(s => s.opacity > 0.01);
          
          for (let star of this.shootingStars) {
            star.x += star.vx;
            star.y += star.vy;
            star.opacity *= star.decay;
          }
        }

        drawBackground() {
          if (this.isDarkMode) {
            // Deep space gradient
            const gradient = this.ctx.createRadialGradient(
              this.canvas.width / 2, this.canvas.height / 2, 0,
              this.canvas.width / 2, this.canvas.height / 2, this.canvas.width
            );
            gradient.addColorStop(0, '#0a0e27');
            gradient.addColorStop(0.5, '#050a1a');
            gradient.addColorStop(1, '#020617');
            this.ctx.fillStyle = gradient;
          } else {
            // Clean light gradient
            const gradient = this.ctx.createLinearGradient(0, 0, 0, this.canvas.height);
            gradient.addColorStop(0, '#ffffff');
            gradient.addColorStop(1, '#f8fafc');
            this.ctx.fillStyle = gradient;
          }
          this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
        }

        drawStars() {
          for (let star of this.stars) {
            const size = star.radius * (1 + star.z * 0.5);
            
            // Draw star glow
            const gradient = this.ctx.createRadialGradient(star.x, star.y, 0, star.x, star.y, size * 4);
            gradient.addColorStop(0, `rgba(${star.color.r}, ${star.color.g}, ${star.color.b}, ${star.opacity * 0.8})`);
            gradient.addColorStop(0.3, `rgba(${star.color.r}, ${star.color.g}, ${star.color.b}, ${star.opacity * 0.4})`);
            gradient.addColorStop(1, `rgba(${star.color.r}, ${star.color.g}, ${star.color.b}, 0)`);
            
            this.ctx.fillStyle = gradient;
            this.ctx.beginPath();
            this.ctx.arc(star.x, star.y, size * 4, 0, Math.PI * 2);
            this.ctx.fill();
            
            // Draw star core
            this.ctx.fillStyle = `rgba(${star.color.r}, ${star.color.g}, ${star.color.b}, ${star.opacity})`;
            this.ctx.beginPath();
            this.ctx.arc(star.x, star.y, size, 0, Math.PI * 2);
            this.ctx.fill();
          }
        }

        drawConstellations() {
          this.ctx.strokeStyle = 'rgba(147, 197, 253, 0.15)';
          this.ctx.lineWidth = 1;
          
          for (let constellation of this.constellations) {
            for (let i = 0; i < constellation.length - 1; i++) {
              const star1 = constellation[i];
              const star2 = constellation[i + 1];
              const distance = Math.sqrt(
                Math.pow(star2.x - star1.x, 2) + Math.pow(star2.y - star1.y, 2)
              );
              
              if (distance < 200) {
                this.ctx.beginPath();
                this.ctx.moveTo(star1.x, star1.y);
                this.ctx.lineTo(star2.x, star2.y);
                this.ctx.stroke();
              }
            }
          }
        }

        drawShootingStars() {
          for (let star of this.shootingStars) {
            const gradient = this.ctx.createLinearGradient(
              star.x, star.y,
              star.x - star.vx * 10, star.y - star.vy * 10
            );
            gradient.addColorStop(0, `rgba(255, 255, 255, ${star.opacity})`);
            gradient.addColorStop(0.5, `rgba(147, 197, 253, ${star.opacity * 0.5})`);
            gradient.addColorStop(1, 'rgba(147, 197, 253, 0)');
            
            this.ctx.strokeStyle = gradient;
            this.ctx.lineWidth = 2;
            this.ctx.beginPath();
            this.ctx.moveTo(star.x, star.y);
            this.ctx.lineTo(star.x - star.vx * 10, star.y - star.vy * 10);
            this.ctx.stroke();
          }
        }

        drawParticles() {
          for (let particle of this.particles) {
            this.ctx.fillStyle = `rgba(${particle.color.r}, ${particle.color.g}, ${particle.color.b}, ${particle.opacity})`;
            this.ctx.beginPath();
            this.ctx.arc(particle.x, particle.y, particle.radius, 0, Math.PI * 2);
            this.ctx.fill();
          }
        }

        animate() {
          this.time++;
          this.drawBackground();
          
          if (this.isDarkMode) {
            this.updateStars();
            this.drawConstellations();
            this.drawStars();
            this.createShootingStar();
            this.updateShootingStars();
            this.drawShootingStars();
          }

          this.updateParticles();
          this.drawParticles();
          
          requestAnimationFrame(() => this.animate());
        }
      }

      let bgAnimation = null;
      let portfolioData = null;

      async function loadPortfolioData() {
        try {
          const response = await fetch("./portfolio-data.json");
          if (!response.ok) {
            throw new Error("HTTP error! status: " + response.status);
          }
          portfolioData = await response.json();
          return portfolioData;
        } catch (error) {
          console.error("Error loading portfolio data:", error);
          document.getElementById("app").innerHTML =
            '<div class="text-red-500 p-8">Error loading portfolio data. Please make sure portfolio-data.json exists in the same directory.</div>';
          throw error;
        }
      }

      function createSectionDivider(title) {
        return `
    <div class="flex items-center my-12 scroll-reveal" data-delay="0.1">
      <div class="flex-grow border-t border-gray-300 dark:border-gray-700"></div>
      <h2 class="font-bold text-2xl text-gray-900 dark:text-white mx-4">${title}</h2>
      <div class="flex-grow border-t border-gray-300 dark:border-gray-700"></div>
    </div>
  `;
      }

      function generateInitials(name) {
        const words = name.trim().split(" ");
        if (words.length === 1) {
          return words[0].charAt(0).toUpperCase();
        } else {
          return words
            .slice(0, 2)
            .map((word) => word.charAt(0).toUpperCase())
            .join("");
        }
      }

      function ensureUrl(url) {
        if (!url || url.startsWith('./') || url.startsWith('/') || url.startsWith('mailto:') || url.startsWith('tel:') || url.match(/^https?:\/\//)) {
          return url;
        }
        return `https://${url}`;
      }

      function setTheme(theme) {
        localStorage.setItem("theme", theme);
        if (theme === "dark") {
          document.documentElement.classList.add("dark");
        } else {
          document.documentElement.classList.remove("dark");
        }
        const toggle = document.getElementById("theme-toggle");
        const toggleMobile = document.getElementById("theme-toggle-mobile");
        if (toggle) {
          toggle.innerHTML = getIconSVG(theme === "dark" ? "sun" : "moon");
        }
        if (toggleMobile) {
          toggleMobile.innerHTML = getIconSVG(theme === "dark" ? "sun" : "moon");
        }
      }

      function setupTheme() {
        const savedTheme = localStorage.getItem("theme");
        const prefersDark = window.matchMedia(
          "(prefers-color-scheme: dark)"
        ).matches;
        const defaultTheme = savedTheme || (prefersDark ? "dark" : "light");
        setTheme(defaultTheme);

        const toggle = document.getElementById("theme-toggle");
        if (toggle) {
          toggle.addEventListener("click", () => {
            const currentTheme = localStorage.getItem("theme") || "light";
            setTheme(currentTheme === "dark" ? "light" : "dark");
          });
        }

        const toggleMobile = document.getElementById("theme-toggle-mobile");
        if (toggleMobile) {
          toggleMobile.addEventListener("click", () => {
            const currentTheme = localStorage.getItem("theme") || "light";
            setTheme(currentTheme === "dark" ? "light" : "dark");
          });
        }
      }

      function setMetaTags(data) {
        const pageTitle = `${data.settings.name} - ${data.settings.title}`;
        const pageDescription = data.settings.summary;
        const pageImage = data.settings.profileImage;
        const pageUrl = window.location.href;

        document.title = pageTitle;

        const createOrUpdateMeta = (property, content, isNameAttribute = false) => {
          const attribute = isNameAttribute ? "name" : "property";
          let element = document.querySelector(`meta[${attribute}="${property}"]`);
          if (!element) {
            element = document.createElement("meta");
            element.setAttribute(attribute, property);
            document.head.appendChild(element);
          }
          element.setAttribute("content", content);
        };

        createOrUpdateMeta("description", pageDescription, true);
        createOrUpdateMeta("og:title", pageTitle);
        createOrUpdateMeta("og:description", pageDescription);
        createOrUpdateMeta("og:image", pageImage);
        createOrUpdateMeta("og:url", pageUrl);
        createOrUpdateMeta("og:type", "website");
        createOrUpdateMeta("twitter:card", "summary_large_image", true);
        createOrUpdateMeta("twitter:title", pageTitle, true);
        createOrUpdateMeta("twitter:description", pageDescription, true);
        createOrUpdateMeta("twitter:image", pageImage, true);

        const canonical = document.getElementById("canonical-link");
        if (canonical) {
          canonical.setAttribute("href", pageUrl.split("#")[0]);
        }
      }

      // Scroll reveal functionality
      function setupScrollReveal() {
        const revealElements = document.querySelectorAll('.scroll-reveal, .scroll-reveal-left, .scroll-reveal-right');
        
        const revealObserver = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              const delay = entry.target.dataset.delay || 0;
              setTimeout(() => {
                entry.target.classList.add('revealed');
              }, parseFloat(delay) * 1000);
            }
          });
        }, {
          threshold: 0.1,
          rootMargin: '0px 0px -50px 0px'
        });

        revealElements.forEach(el => {
          revealObserver.observe(el);
        });
      }

      // Parallax effect for hero section
      function setupParallax() {
        let ticking = false;
        
        window.addEventListener('scroll', () => {
          if (!ticking) {
            window.requestAnimationFrame(() => {
              const scrolled = window.pageYOffset;
              const parallaxElements = document.querySelectorAll('.parallax');
              
              parallaxElements.forEach(el => {
                const speed = el.dataset.speed || 0.5;
                el.style.transform = `translateY(${scrolled * speed}px)`;
              });
              
              ticking = false;
            });
            ticking = true;
          }
        });
      }

                </div>
                <div class="flex items-center gap-4 flex-wrap justify-center">
                  ${socialLinksHTML}
                </div>
            </div>
            ${contactFormHTML}
        </div>
      `;
          }

          let footerHTML = "";
          if (data.footer && data.footer.enabled) {
            footerHTML = `
        <footer class="py-8 text-center text-sm text-gray-500 dark:text-gray-600 border-t border-gray-200 dark:border-gray-700 mt-20">
            <p class="animate-fade-in">${data.footer.copyright}</p>
        </footer>
      `;
          }

          const content = `
    ${headerHTML}
    <div class="flex flex-col min-h-screen relative nav-mobile:pt-20 crosshair-cursor">
      <div class="nav-desktop fixed top-4 right-4 z-50 animate-fade-in">
          <button id="theme-toggle" class="p-2 rounded-full bg-gray-200 dark:bg-gray-800 text-gray-900 dark:text-white hover:bg-gray-300 dark:hover:bg-gray-700 transition-all duration-300 hover:scale-110 target-element hud-corners"></button>
      </div>
      <main class="flex-grow max-w-4xl mx-auto px-4 sm:px-6 pt-32 sm:pt-40 pb-12 animate-blur-in nav-mobile:pt-8">
        <header class="grid grid-cols-1 sm:grid-cols-3 gap-8 sm:gap-12 items-center mb-16 sm:mb-20 scroll-reveal">
            <div class="sm:col-span-1 flex justify-center animate-float parallax" data-speed="0.2">
              <div class="relative group">
                <div class="absolute inset-0 bg-gradient-to-r from-blue-400 to-blue-600 dark:from-blue-500 dark:to-blue-700 rounded-full blur-xl opacity-50 group-hover:opacity-75 transition-opacity duration-500 animate-pulse-glow"></div>
                <img src="${data.settings.profileImage}" alt="${data.settings.name}" class="profile-image-container relative rounded-full w-40 h-40 sm:w-48 sm:h-48 object-cover border-4 border-white dark:border-gray-800 shadow-2xl img-interactive" loading="lazy">
              </div>
            </div>
            <div class="sm:col-span-2 scroll-reveal text-center sm:text-left" data-delay="0.1">
                <h1 class="text-3xl sm:text-5xl font-bold text-gray-900 dark:text-white mb-2">Hey, I'm ${data.settings.name}</h1>
                <p class="text-base sm:text-xl text-gray-700 dark:text-gray-300 mb-6">${data.settings.title} • ${data.settings.location}</p>
                 <div class="flex flex-wrap gap-4 mt-8 justify-center sm:justify-start">
                  ${ctaButtonsHTML}
                </div>
            </div>
        </header>

        ${aboutHTML}
        ${skillsHTML}
        ${projectsHTML}
        ${experienceHTML}
        ${educationHTML}
        ${achievementsHTML}
        ${contactHTML}

      </main>
      ${footerHTML}
    </div>
    `;

          document.getElementById("app").innerHTML = content;
          
          
          setupTheme();
          setupScrollReveal();
          setupParallax();

          try {
            const personSchema = {
              "@context": "https://schema.org",
              "@type": "Person",
              name: data.settings.name,
              jobTitle: data.settings.title,
              description: data.settings.summary,
              image: data.settings.profileImage,
              url: window.location.href,
              sameAs: (data.sections.social?.items || []).map((s) => ensureUrl(s.url)),
              address: {
                "@type": "PostalAddress",
                addressLocality: data.settings.location,
              },
            };
            const ld = document.createElement("script");
            ld.type = "application/ld+json";
            ld.textContent = JSON.stringify(personSchema);
            document.head.appendChild(ld);
          } catch (e) {
            console.warn("JSON-LD injection failed", e);
          }

          document.querySelectorAll('a[href^="#"]').forEach((anchor) => {
            anchor.addEventListener("click", function (e) {
              e.preventDefault();
              const targetId = this.getAttribute("href");
              if (targetId === "#") {
                window.scrollTo({ top: 0, behavior: "smooth" });
                return;
              }
              const targetElement = document.querySelector(targetId);
              if (targetElement) {
                targetElement.scrollIntoView({ behavior: "smooth", block: "start" });
              }
            });
          });

          const hamburgerMenu = document.getElementById("hamburger-menu");
          const sidebar = document.getElementById("mobile-sidebar");

          function closeSidebar() {
            if (sidebar) {
              sidebar.classList.add("-translate-x-full");
            }
          }

          if (hamburgerMenu && sidebar) {
            hamburgerMenu.addEventListener("click", () => {
              const isOpen = !sidebar.classList.contains("-translate-x-full");
              if (isOpen) {
                closeSidebar();
              } else {
                sidebar.classList.remove("-translate-x-full");
              }
            });

            sidebar.querySelectorAll("a").forEach((link) => {
              link.addEventListener("click", () => {
                closeSidebar();
              });
            });

            document.addEventListener("click", (event) => {
              if (!sidebar.contains(event.target) && !hamburgerMenu.contains(event.target)) {
                closeSidebar();
              }
            });

            document.addEventListener("keydown", (event) => {
              if (event.key === "Escape") {
                closeSidebar();
              }
            });
          }

          setTimeout(() => {
          }, 500);
        } catch (err) {
          document.getElementById("app").innerHTML = `<div class="text-red-500 p-8">Error: ${err.message}</div>`;
          console.error(err);
        }
      }

      function handleContactForm(event) {
        event.preventDefault();
        const form = event.target;
        
        const successMsg = document.createElement('div');
        successMsg.className = 'fixed top-20 left-1/2 -translate-x-1/2 z-50 bg-green-500 text-white px-6 py-3 rounded-lg shadow-lg animate-slide-up';
        successMsg.textContent = '✓ Message sent successfully! Thank you for reaching out.';
        document.body.appendChild(successMsg);
        
        setTimeout(() => {
          successMsg.style.animation = 'fadeOut 0.5s ease-out forwards';
          setTimeout(() => successMsg.remove(), 500);
        }, 4000);
        
        form.reset();
      }

      document.addEventListener("DOMContentLoaded", () => {
        bgAnimation = new BackgroundAnimationSystem();
        renderPortfolio();
      });
    </script>
  </body>
</html>
